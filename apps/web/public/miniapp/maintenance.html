<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>КРЕСТ — приложение в разработке</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      width: 100%;
      background: #0e1116;
      color: #e6e6e6;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .wrap { max-width: 380px; width: 100%; }
    .cross {
      font-size: 64px;
      margin-bottom: 16px;
      filter: drop-shadow(0 6px 18px rgba(201, 169, 97, 0.25));
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #C9A961;
      margin-bottom: 14px;
      letter-spacing: 0.3px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #b8b8b8;
      margin-bottom: 12px;
    }
    .small {
      margin-top: 28px;
      font-size: 12px;
      color: #6b6b6b;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="cross">✝️</div>
    <h1>Приложение в разработке</h1>
    <p>Извините, мы сейчас обновляем платформу.</p>
    <p>Попробуйте зайти позже — скоро будет всё готово.</p>
    <div class="small">КРЕСТ · maintenance mode</div>
  </div>
</body>
</html>
