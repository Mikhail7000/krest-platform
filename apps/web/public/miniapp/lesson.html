<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Урок — КРЕСТ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="js/maintenance-gate.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ── Lesson header ── */
    .lesson-header {
      padding: 20px 20px 0;
    }
    .lesson-block-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,169,97,0.15);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .lesson-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--tg-text);
      line-height: 1.3;
      margin-bottom: 20px;
    }

    /* ── Video ── */
    .video-wrap {
      position: relative;
      padding-top: 56.25%;
      background: #000;
    }
    .video-wrap iframe,
    .video-wrap > div {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Forum ── */
    .forum-wrap {
      padding: 20px 16px 8px;
    }
    .forum-header {
      margin-bottom: 20px;
      text-align: center;
    }
    .forum-header .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--tg-text);
      margin-bottom: 6px;
    }
    .forum-intro {
      font-size: 13px;
      color: var(--tg-hint);
      line-height: 1.5;
    }
    .forum-question {
      background: var(--tg-secondary);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .question-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .question-num {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .question-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--tg-text);
      line-height: 1.4;
    }
    .forum-question textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      font-size: 14px;
      background: rgba(255,255,255,0.05);
      color: var(--tg-text);
      resize: none;
      min-height: 90px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .forum-question textarea:focus {
      border-color: var(--accent);
    }
    .forum-question textarea::placeholder {
      color: var(--tg-hint);
      font-size: 13px;
    }
    .q-counter {
      font-size: 11px;
      color: var(--tg-hint);
      text-align: right;
      margin-top: 6px;
      transition: color 0.2s;
    }
    .q-counter.done {
      color: #34C759;
    }
    .forum-submit-wrap {
      padding: 4px 16px 20px;
    }

    /* ── Konspekt ── */
    .konspekt-section {
      padding: 0 0 40px;
    }
    .konspekt-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 24px 20px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .konspekt-icon {
      width: 36px;
      height: 36px;
      background: rgba(201,169,97,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .konspekt-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--tg-text);
    }
    .konspekt-body {
      padding: 0 20px;
    }
    /* Rich text overrides for konspekt content */
    .konspekt-body h1,
    .konspekt-body h2,
    .konspekt-body h3,
    .konspekt-body h4 {
      color: #C9A961 !important;
      font-size: 17px !important;
      font-weight: 700 !important;
      margin: 22px 0 8px !important;
      line-height: 1.4 !important;
    }
    .konspekt-body h1 { font-size: 19px !important; }
    .konspekt-body p {
      color: rgba(255,255,255,0.88) !important;
      font-size: 15px !important;
      line-height: 1.75 !important;
      margin-bottom: 12px !important;
    }
    .konspekt-body ul,
    .konspekt-body ol {
      color: rgba(255,255,255,0.88) !important;
      font-size: 15px !important;
      line-height: 1.75 !important;
      padding-left: 20px !important;
      margin-bottom: 14px !important;
    }
    .konspekt-body li {
      margin-bottom: 6px !important;
    }
    .konspekt-body strong,
    .konspekt-body b {
      color: #fff !important;
      font-weight: 700 !important;
    }
    .konspekt-body em,
    .konspekt-body i {
      color: #C9A961 !important;
      font-style: italic !important;
    }
    .konspekt-body blockquote {
      border-left: 3px solid #C9A961 !important;
      margin: 16px 0 !important;
      padding: 10px 16px !important;
      background: rgba(201,169,97,0.08) !important;
      border-radius: 0 8px 8px 0 !important;
      color: rgba(255,255,255,0.88) !important;
      font-style: italic !important;
    }
    .konspekt-body img {
      width: 100% !important;
      border-radius: 12px !important;
      margin: 12px 0 !important;
    }
    .konspekt-body hr {
      border: none !important;
      border-top: 1px solid rgba(255,255,255,0.1) !important;
      margin: 20px 0 !important;
    }

    /* ── Approval status ── */
    .approval-wrap {
      margin: 20px 16px 0;
    }
    .approval-card {
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      line-height: 1.5;
    }
    .approval-card.approved {
      background: rgba(52,199,89,0.12);
      color: #34C759;
      border: 1px solid rgba(52,199,89,0.25);
    }
    .approval-card.pending {
      background: rgba(201,169,97,0.1);
      color: #C9A961;
      border: 1px solid rgba(201,169,97,0.25);
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Загрузка...</span>
</div>

<div id="lessonView" style="display:none">

  <!-- Header -->
  <div class="lesson-header">
    <div class="lesson-block-badge" id="blockBadge"></div>
    <div class="lesson-title" id="lessonTitle"></div>
    <div id="cohortBadge" style="display:none;margin-top:8px;background:rgba(79,70,229,0.1);border:1px solid rgba(79,70,229,0.3);color:#818cf8;font-size:12px;font-weight:600;padding:5px 12px;border-radius:14px;display:inline-block;">
      👥 <span id="cohortText">Малая группа: 1 человек</span>
    </div>
  </div>

  <!-- Video -->
  <div class="video-wrap" id="videoWrap"></div>

  <!-- Forum (hidden until video complete) -->
  <div id="forumSection" style="display:none">
    <div class="forum-wrap">
      <div class="forum-header">
        <div class="section-title">💬 Поделитесь размышлениями</div>
        <p class="forum-intro">Ответьте на три вопроса — минимум 100 символов каждый.<br>Конспект откроется после отправки.</p>
      </div>

      <div class="forum-question">
        <div class="question-label">
          <div class="question-num">1</div>
          <div class="question-text">Что нового узнал из этого урока?</div>
        </div>
        <textarea id="q1" placeholder="Поделитесь своими мыслями..." oninput="updateCount(1)"></textarea>
        <div class="q-counter" id="cnt1">0 / 100</div>
      </div>

      <div class="forum-question">
        <div class="question-label">
          <div class="question-num">2</div>
          <div class="question-text">Что вдохновило тебя?</div>
        </div>
        <textarea id="q2" placeholder="Что тронуло сердце..." oninput="updateCount(2)"></textarea>
        <div class="q-counter" id="cnt2">0 / 100</div>
      </div>

      <div class="forum-question">
        <div class="question-label">
          <div class="question-num">3</div>
          <div class="question-text">Что берёшь на практику?</div>
        </div>
        <textarea id="q3" placeholder="Конкретные шаги и решения..." oninput="updateCount(3)"></textarea>
        <div class="q-counter" id="cnt3">0 / 100</div>
      </div>
    </div>
    <div class="forum-submit-wrap">
      <button class="btn" id="forumBtn" onclick="submitForum()" disabled>Отправить ответы</button>
    </div>
  </div>

  <!-- Konspekt (hidden until forum submitted) -->
  <div id="konspektSection" style="display:none">
    <div class="konspekt-header">
      <div class="konspekt-icon">📖</div>
      <div class="konspekt-label">Конспект урока</div>
    </div>
    <div class="konspekt-body" id="konspektContent"></div>
    <div class="approval-wrap">
      <div id="approvalStatus"></div>
    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let ytPlayer = null;
let maxWatched = 0;
let videoComplete = false;
let pollInterval = null;
let currentUser = null;
let currentProfile = null;
let currentBlock = null;
let currentProgress = null;

const params = new URLSearchParams(location.search);
const blockId = parseInt(params.get('blockId'));
const TEST_MODE = params.get('test') === '1';

async function init() {
  if (!blockId) { window.location.href = 'index.html'; return; }

  const result = await requireAuth();
  if (!result) return;
  currentUser = result.user;
  currentProfile = result.profile;

  if (tg?.BackButton) {
    tg.BackButton.show();
    tg.BackButton.onClick(() => { window.location.href = 'index.html'; });
  }

  const { data: block, error } = await _supabase
    .from('blocks')
    .select('*')
    .eq('id', blockId)
    .single();

  if (error || !block) {
    toast('Блок не найден', 'error');
    showLoading(false);
    return;
  }
  currentBlock = block;

  if ((currentProfile.blocks_unlocked || 1) < block.order_num) {
    window.location.href = 'index.html';
    return;
  }

  const { data: progress } = await _supabase
    .from('student_progress')
    .select('*')
    .eq('user_id', currentUser.id)
    .eq('block_id', blockId)
    .is('lesson_id', null)
    .single();

  currentProgress = progress;

  const { data: journal } = await _supabase
    .from('journal_entries')
    .select('id')
    .eq('user_id', currentUser.id)
    .eq('block_id', blockId)
    .single();

  const alreadySubmitted = !!journal;
  const isApproved = progress?.admin_approved === true;

  document.title = block.title_ru + ' — КРЕСТ';
  if (TEST_MODE) {
    const badge = document.createElement('div');
    badge.style.cssText = 'background:#ff3b30;color:#fff;font-size:11px;font-weight:700;text-align:center;padding:4px;letter-spacing:1px;';
    badge.textContent = '⚡ TEST MODE — 2x speed, 5% threshold';
    document.body.insertBefore(badge, document.getElementById('loading'));
  }
  document.getElementById('blockBadge').textContent = `Блок ${block.order_num}`;
  document.getElementById('lessonTitle').textContent = block.title_ru;

  const videoUrl = block.youtube_ru || block.youtube_en;
  if (videoUrl) {
    loadYouTube(videoUrl, alreadySubmitted);
  } else {
    if (!alreadySubmitted) showForum();
  }

  if (alreadySubmitted) {
    showKonspekt(block, isApproved);
  }

  showLoading(false);
  document.getElementById('lessonView').style.display = 'block';

  // Auto-cohort: подключаем студента к малой группе этого блока
  joinCohort(currentUser.id, blockId);
}

async function joinCohort(userId, blockId) {
  try {
    const res = await fetch('https://krest-platform-web.vercel.app/api/miniapp/cohort', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, block_id: blockId })
    });
    if (!res.ok) return;
    const { data } = await res.json();
    if (!data) return;

    const badge = document.getElementById('cohortBadge');
    const text = document.getElementById('cohortText');
    const count = data.member_count || 1;
    const word = count === 1 ? 'человек' : (count < 5 ? 'человека' : 'человек');
    text.textContent = `Малая группа: ${count} ${word}`;
    badge.style.display = 'inline-block';
  } catch (e) {
    console.error('cohort join failed', e);
  }
}

function loadYouTube(url, skipToForum) {
  const videoId = extractYtId(url);
  if (!videoId) { if (!skipToForum) showForum(); return; }

  const wrap = document.getElementById('videoWrap');
  wrap.innerHTML = `<div id="ytPlayer"></div>`;

  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    ytPlayer = new YT.Player('ytPlayer', {
      videoId,
      playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
      events: {
        onReady: () => {
          if (!skipToForum) {
            if (TEST_MODE) ytPlayer.setPlaybackRate(2);
            startPolling();
          }
        }
      }
    });
  };
}

function startPolling() {
  pollInterval = setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    const current = ytPlayer.getCurrentTime();
    const duration = ytPlayer.getDuration();

    if (current > maxWatched + 2) {
      ytPlayer.seekTo(maxWatched);
    } else {
      maxWatched = Math.max(maxWatched, current);
    }

    const threshold = TEST_MODE ? 0.05 : 0.95;
    if (duration > 0 && maxWatched / duration >= threshold && !videoComplete) {
      videoComplete = true;
      clearInterval(pollInterval);
      showForum();
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }
  }, 500);
}

function showForum() {
  document.getElementById('forumSection').style.display = 'block';
  document.getElementById('forumSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateCount(n) {
  const min = TEST_MODE ? 5 : 100;
  const len = document.getElementById('q' + n).value.length;
  const el = document.getElementById('cnt' + n);
  el.textContent = len + ' / ' + min;
  el.classList.toggle('done', len >= min);
  checkForumReady();
}

function checkForumReady() {
  const min = TEST_MODE ? 5 : 100;
  const ok = [1,2,3].every(n => document.getElementById('q' + n).value.length >= min);
  document.getElementById('forumBtn').disabled = !ok;
}

async function submitForum() {
  const q1 = document.getElementById('q1').value.trim();
  const q2 = document.getElementById('q2').value.trim();
  const q3 = document.getElementById('q3').value.trim();

  const minLen = TEST_MODE ? 5 : 100;
  if ([q1,q2,q3].some(q => q.length < minLen)) {
    toast(`Минимум ${minLen} символов в каждом ответе`, 'error');
    return;
  }

  const btn = document.getElementById('forumBtn');
  btn.disabled = true;
  btn.textContent = 'Сохранение...';

  const content = `1. Что нового узнал:\n${q1}\n\n2. Что вдохновило:\n${q2}\n\n3. Беру на практику:\n${q3}`;

  const { error: je } = await _supabase
    .from('journal_entries')
    .insert({
      user_id: currentUser.id,
      block_id: blockId,
      lesson_id: null,
      content,
      submitted_to_leader: true
    });

  if (je) {
    toast('Ошибка сохранения', 'error');
    btn.disabled = false;
    btn.textContent = 'Отправить ответы';
    return;
  }

  if (!currentProgress) {
    const { data: inserted } = await _supabase
      .from('student_progress')
      .insert({
        user_id: currentUser.id,
        block_id: blockId,
        lesson_id: null,
        admin_approved: false
      })
      .select()
      .single();
    currentProgress = inserted;
  }

  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  toast('Ответы отправлены!', 'success');
  document.getElementById('forumSection').style.display = 'none';
  showKonspekt(currentBlock, false);

  // Notify leader via Telegram
  notifyLeader(content);
}

function showKonspekt(block, isApproved) {
  document.getElementById('konspektSection').style.display = 'block';
  document.getElementById('konspektContent').innerHTML = block.content_ru || '';

  const el = document.getElementById('approvalStatus');
  if (isApproved) {
    el.innerHTML = '<div class="approval-card approved">✅ Блок одобрен лидером<br><span style="font-weight:400;font-size:13px;opacity:0.8">Следующий блок открыт</span></div>';
  } else {
    el.innerHTML = '<div class="approval-card pending">⏳ Ожидает проверки лидера<br><span style="font-weight:400;font-size:13px;opacity:0.8">Вы получите уведомление в Telegram</span></div>';
  }

  setTimeout(() => {
    document.getElementById('konspektSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

async function notifyLeader(journalContent) {
  try {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session?.access_token) return;

    const preview = journalContent.slice(0, 300) + (journalContent.length > 300 ? '...' : '');

    await fetch('https://krest-platform-web.vercel.app/api/miniapp/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: session.access_token,
        block_num: currentBlock.order_num,
        block_name: currentBlock.title_ru,
        student_name: currentProfile.full_name || currentUser.email,
        preview
      })
    });
  } catch (e) {
    console.error('notify error:', e);
  }
}

function extractYtId(url) {
  if (!url) return null;
  if (/^[a-zA-Z0-9_-]{11}$/.test(url.trim())) return url.trim();
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

init();
</script>
</body>
</html>
