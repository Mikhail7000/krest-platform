<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Лидер — КРЕСТ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .student-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201,169,97,0.15);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }
    .student-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .student-name {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.2px;
      color: var(--tg-text);
    }
    .student-email {
      font-size: 12px;
      color: var(--tg-hint);
      margin-top: 3px;
      font-weight: 500;
    }
    .pending-list { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
    .pending-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(201,169,97,0.1);
    }
    .pending-row-info {
      font-size: 14px;
      font-weight: 600;
    }
    .pending-row-sub {
      font-size: 12px;
      color: var(--tg-hint);
      margin-top: 3px;
      font-weight: 500;
    }
    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .approve-btn {
      flex: 1;
      background: linear-gradient(135deg, #34C759 0%, #2EA04F 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(52,199,89,0.3);
      letter-spacing: 0.3px;
    }
    .approve-btn:active { transform: scale(0.96); opacity: 0.9; }
    .approve-btn:disabled {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      cursor: default;
      box-shadow: none;
      transform: none;
    }
    .reject-btn {
      flex: 1;
      background: linear-gradient(135deg, #FF3B30 0%, #CC2A20 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      box-shadow: 0 3px 10px rgba(255,59,48,0.3);
      letter-spacing: 0.3px;
    }
    .reject-btn:active { transform: scale(0.96); opacity: 0.9; }
    .reject-btn:disabled {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      cursor: default;
      box-shadow: none;
      transform: none;
    }
    .reject-form {
      margin-top: 12px;
      background: rgba(255,59,48,0.06);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 12px;
      padding: 14px;
    }
    .reject-form-label {
      font-size: 12px;
      font-weight: 700;
      color: #FF6B60;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
    }
    .reject-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px 12px;
      border: 1px solid rgba(255,59,48,0.25);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: var(--tg-text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      box-sizing: border-box;
      line-height: 1.5;
    }
    .reject-form textarea:focus { border-color: #FF3B30; }
    .reject-form textarea::placeholder { color: var(--tg-hint); font-size: 13px; }
    .reject-form-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .cancel-reject-btn {
      flex: 1;
      background: rgba(255,255,255,0.08);
      color: var(--tg-hint);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .send-reject-btn {
      flex: 2;
      background: linear-gradient(135deg, #FF3B30 0%, #CC2A20 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(255,59,48,0.3);
    }
    .send-reject-btn:disabled {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      cursor: default;
      box-shadow: none;
    }
    .approved-tag {
      font-size: 12px;
      color: #34C759;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .journal-toggle {
      font-size: 12px;
      color: var(--gold);
      cursor: pointer;
      margin-top: 8px;
      display: inline-block;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .journal-text {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,169,97,0.1);
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.6;
      margin-top: 8px;
      color: rgba(255,255,255,0.88);
      display: none;
      font-weight: 500;
    }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--tg-hint);
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
      filter: drop-shadow(0 2px 8px rgba(201,169,97,0.2));
    }
    .empty-state p {
      font-weight: 500;
      font-size: 15px;
    }
    .tab-bar {
      display: flex;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201,169,97,0.15);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      color: var(--tg-hint);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.2px;
    }
    .tab.active {
      background: rgba(201,169,97,0.2);
      color: var(--gold);
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(201,169,97,0.2);
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #FF3B30 0%, #FF6B60 100%);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      border-radius: 10px;
      padding: 2px 6px;
      margin-left: 5px;
      vertical-align: middle;
      box-shadow: 0 2px 8px rgba(255,59,48,0.4);
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Загрузка...</span>
</div>

<div id="adminView" style="display:none">
  <div class="page-header">
    <h1>✝️ КРЕСТ — Лидер</h1>
    <p id="leaderName"></p>
    <button onclick="doLogout()" style="margin-top:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--tg-hint);font-size:13px;font-weight:600;padding:8px 20px;border-radius:20px;cursor:pointer;letter-spacing:0.3px;">Выйти из аккаунта</button>
  </div>

  <div class="section">
    <div class="tab-bar">
      <div class="tab active" id="tabPending" onclick="switchTab('pending')">
        Ожидают <span class="badge" id="pendingBadge" style="display:none">0</span>
      </div>
      <div class="tab" id="tabAll" onclick="switchTab('all')">Студенты</div>
      <div class="tab" id="tabContent" onclick="switchTab('content')">Контент</div>
    </div>

    <div id="pendingView">
      <div id="pendingList"></div>
    </div>
    <div id="allView" style="display:none">
      <div id="allList"></div>
    </div>
    <div id="contentView" style="display:none">
      <div id="contentList"></div>
    </div>
  </div>
</div>

<!-- Content Editor Modal -->
<div id="editorModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;overflow-y:auto;padding:16px">
  <div style="max-width:600px;margin:20px auto;background:var(--tg-bg);border-radius:16px;border:1px solid rgba(201,169,97,0.25);overflow:hidden">
    <div style="padding:16px 20px;border-bottom:1px solid rgba(201,169,97,0.15);display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div style="font-size:16px;font-weight:700;color:var(--gold)" id="editorTitle">Редактор блока</div>
      <button onclick="closeEditor()" style="background:transparent;border:none;color:var(--tg-hint);font-size:24px;cursor:pointer;padding:4px 8px">×</button>
    </div>
    <form id="editorForm" onsubmit="saveBlock(event)" style="padding:16px 20px;display:flex;flex-direction:column;gap:14px">
      <input type="hidden" id="editBlockId" />

      <div>
        <label class="ed-label">Порядок (1-6)</label>
        <input type="number" id="editOrder" min="1" max="6" required class="ed-input" />
      </div>
      <div>
        <label class="ed-label">Буква (C/R/E/S/T)</label>
        <input type="text" id="editLetter" maxlength="1" class="ed-input" />
      </div>
      <div>
        <label class="ed-label">Заголовок (RU)</label>
        <input type="text" id="editTitleRu" required class="ed-input" />
      </div>
      <div>
        <label class="ed-label">Заголовок (EN)</label>
        <input type="text" id="editTitleEn" class="ed-input" />
      </div>
      <div>
        <label class="ed-label">Подзаголовок-вопрос (RU)</label>
        <input type="text" id="editSubtitleRu" placeholder="Кем Бог создал человека?" class="ed-input" />
      </div>
      <div>
        <label class="ed-label">Подзаголовок-вопрос (EN)</label>
        <input type="text" id="editSubtitleEn" class="ed-input" />
      </div>
      <div>
        <label class="ed-label">Краткое описание (RU)</label>
        <textarea id="editDescRu" rows="2" class="ed-input"></textarea>
      </div>
      <div>
        <label class="ed-label">Краткое описание (EN)</label>
        <textarea id="editDescEn" rows="2" class="ed-input"></textarea>
      </div>
      <div>
        <label class="ed-label">YouTube URL (RU)</label>
        <input type="url" id="editYtRu" placeholder="https://youtube.com/watch?v=..." class="ed-input" />
      </div>
      <div>
        <label class="ed-label">YouTube URL (EN)</label>
        <input type="url" id="editYtEn" class="ed-input" />
      </div>
      <div>
        <label class="ed-label">Конспект HTML (RU)</label>
        <textarea id="editContentRu" rows="10" class="ed-input" style="font-family:monospace;font-size:12px"></textarea>
      </div>
      <div>
        <label class="ed-label">Конспект HTML (EN)</label>
        <textarea id="editContentEn" rows="10" class="ed-input" style="font-family:monospace;font-size:12px"></textarea>
      </div>
      <div>
        <label class="ed-label">Цвет (HEX)</label>
        <input type="text" id="editColor" placeholder="#0071e3" class="ed-input" />
      </div>
      <div id="editorError" style="color:#FF3B30;font-size:13px;display:none"></div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="button" onclick="closeEditor()" style="flex:1;padding:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--tg-text);font-weight:600;cursor:pointer">Отмена</button>
        <button type="submit" id="saveBlockBtn" style="flex:2;padding:12px;background:linear-gradient(135deg,#C9A961,#B89548);border:none;border-radius:10px;color:#0A0E1A;font-weight:700;cursor:pointer">Сохранить</button>
      </div>
    </form>
  </div>
</div>
<style>
  .ed-label { display:block; font-size:11px; font-weight:700; color:var(--tg-hint); letter-spacing:0.4px; text-transform:uppercase; margin-bottom:4px; }
  .ed-input { width:100%; box-sizing:border-box; padding:10px 12px; background:rgba(255,255,255,0.04); border:1px solid rgba(201,169,97,0.2); border-radius:8px; color:var(--tg-text); font-size:14px; outline:none; resize:vertical; }
  .ed-input:focus { border-color:var(--gold); }
</style>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let allStudents = [];
let pendingItems = [];
let currentLeaderName = '';

async function init() {
  const result = await requireAdmin();
  if (!result) return;

  if (tg?.BackButton) tg.BackButton.hide();

  currentLeaderName = result.profile.full_name || result.user.email;
  document.getElementById('leaderName').textContent = currentLeaderName;

  await loadData();
  showLoading(false);
  document.getElementById('adminView').style.display = 'block';
}

async function loadData() {
  // All students
  const { data: students } = await _supabase
    .from('profiles')
    .select('id, full_name, email, blocks_unlocked')
    .eq('role', 'student')
    .order('full_name');

  // All student_progress with lesson_id IS NULL
  const { data: progresses } = await _supabase
    .from('student_progress')
    .select('id, user_id, block_id, admin_approved')
    .is('lesson_id', null);

  // All blocks for names
  const { data: blocks } = await _supabase
    .from('blocks')
    .select('id, order_num, title_ru')
    .order('order_num');

  // All journal entries for reading answers
  const { data: journals } = await _supabase
    .from('journal_entries')
    .select('user_id, block_id, content')
    .is('lesson_id', null);

  const blockMap = {};
  (blocks || []).forEach(b => { blockMap[b.id] = b; });

  const journalMap = {};
  (journals || []).forEach(j => { journalMap[`${j.user_id}_${j.block_id}`] = j.content; });

  const progressMap = {};
  (progresses || []).forEach(p => {
    if (!progressMap[p.user_id]) progressMap[p.user_id] = {};
    progressMap[p.user_id][p.block_id] = { id: p.id, approved: p.admin_approved };
  });

  allStudents = (students || []).map(s => ({
    ...s,
    progresses: progressMap[s.id] || {},
    journalMap,
  }));

  // Build pending items
  pendingItems = [];
  allStudents.forEach(student => {
    Object.entries(student.progresses).forEach(([blockId, prog]) => {
      if (prog.approved === false) {
        pendingItems.push({
          student,
          block: blockMap[blockId],
          progressId: prog.id,
          blockId: parseInt(blockId),
          journalContent: journalMap[`${student.id}_${blockId}`] || '',
        });
      }
    });
  });

  renderPending();
  renderAll(blockMap);

  // Badge
  const badge = document.getElementById('pendingBadge');
  if (pendingItems.length > 0) {
    badge.textContent = pendingItems.length;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

function renderPending() {
  const list = document.getElementById('pendingList');
  if (pendingItems.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>Нет ожидающих одобрения</p></div>';
    return;
  }

  list.innerHTML = '';
  pendingItems.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'student-card';
    div.innerHTML = `
      <div class="student-name">${item.student.full_name || item.student.email}</div>
      <div style="font-size:13px;color:var(--tg-hint);margin-top:2px">Блок ${item.block?.order_num}: ${item.block?.title_ru}</div>
      ${item.journalContent ? `
        <span class="journal-toggle" onclick="toggleJournal(this)">📝 Читать ответ</span>
        <div class="journal-text">${item.journalContent}</div>
      ` : ''}
      <div class="action-row" id="actionRow_${idx}">
        <button class="approve-btn" id="appBtn_${idx}" onclick="approveBlock(${idx})">✅ Одобрить</button>
        <button class="reject-btn" id="rejBtn_${idx}" onclick="showRejectForm(${idx})">❌ Не одобрить</button>
      </div>
      <div class="reject-form" id="rejForm_${idx}" style="display:none">
        <div class="reject-form-label">💬 Комментарий студенту (обязателен)</div>
        <textarea id="rejComment_${idx}" placeholder="Напишите, что именно нужно доработать..."></textarea>
        <div class="reject-form-actions">
          <button class="cancel-reject-btn" onclick="cancelReject(${idx})">Отмена</button>
          <button class="send-reject-btn" id="sendRejBtn_${idx}" onclick="submitReject(${idx})">Отправить отказ</button>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function renderAll(blockMap) {
  const list = document.getElementById('allList');
  if (allStudents.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">👥</div><p>Нет студентов</p></div>';
    return;
  }

  list.innerHTML = '';
  allStudents.forEach(student => {
    const approvedCount = Object.values(student.progresses).filter(p => p.approved).length;
    const pendingCount = Object.values(student.progresses).filter(p => p.approved === false).length;

    const card = document.createElement('div');
    card.className = 'student-card';

    const progressPct = Math.round(approvedCount / 6 * 100);

    card.innerHTML = `
      <div class="student-header">
        <div>
          <div class="student-name">${student.full_name || '—'}</div>
          <div class="student-email">${student.email || ''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600">${approvedCount}/6</div>
          ${pendingCount > 0 ? `<div style="font-size:11px;color:var(--gold);margin-top:2px">⏳ ${pendingCount} ожидает</div>` : ''}
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    `;
    list.appendChild(card);
  });
}

async function approveBlock(idx) {
  const item = pendingItems[idx];
  const btn = document.getElementById(`appBtn_${idx}`);
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  // UPDATE admin_approved
  const { error: e1 } = await _supabase
    .from('student_progress')
    .update({ admin_approved: true })
    .eq('id', item.progressId);

  if (e1) {
    toast('Ошибка одобрения', 'error');
    btn.disabled = false;
    btn.textContent = '✅ Одобрить';
    return;
  }

  // Increment blocks_unlocked (max 6)
  const { error: e2 } = await _supabase
    .from('profiles')
    .update({ blocks_unlocked: Math.min((item.student.blocks_unlocked || 1) + 1, 6) })
    .eq('id', item.student.id);

  if (e2) {
    toast('Прогресс не обновлён', 'error');
  }

  btn.textContent = '✅ Одобрено';
  toast(`${item.student.full_name || 'Студент'} — Блок ${item.block?.order_num} одобрен`, 'success');
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

  // Remove from pending list
  pendingItems.splice(idx, 1);
  setTimeout(() => loadData(), 500);
}

function showRejectForm(idx) {
  document.getElementById(`actionRow_${idx}`).style.display = 'none';
  document.getElementById(`rejForm_${idx}`).style.display = 'block';
  document.getElementById(`rejComment_${idx}`).focus();
}

function cancelReject(idx) {
  document.getElementById(`rejForm_${idx}`).style.display = 'none';
  document.getElementById(`actionRow_${idx}`).style.display = 'flex';
}

async function submitReject(idx) {
  const item = pendingItems[idx];
  const comment = document.getElementById(`rejComment_${idx}`).value.trim();
  if (!comment) {
    toast('Напишите комментарий для студента', 'error');
    return;
  }

  const sendBtn = document.getElementById(`sendRejBtn_${idx}`);
  sendBtn.disabled = true;
  sendBtn.textContent = 'Отправка...';

  const res = await fetch('https://krest-platform-web.vercel.app/api/miniapp/notify-rejection', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      student_id: item.student.id,
      block_id: item.blockId,
      block_num: item.block?.order_num,
      block_name: item.block?.title_ru,
      leader_name: currentLeaderName,
      comment
    })
  });

  if (!res.ok) {
    toast('Ошибка при отклонении', 'error');
    sendBtn.disabled = false;
    sendBtn.textContent = 'Отправить отказ';
    return;
  }

  toast(`Блок ${item.block?.order_num} отклонён. Студент может пересдать.`, 'success');
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
  setTimeout(() => loadData(), 500);
}

function toggleJournal(el) {
  const text = el.nextElementSibling;
  const shown = text.style.display === 'block';
  text.style.display = shown ? 'none' : 'block';
  el.textContent = shown ? '📝 Читать ответ' : '🔼 Скрыть';
}

function switchTab(tab) {
  document.getElementById('tabPending').classList.toggle('active', tab === 'pending');
  document.getElementById('tabAll').classList.toggle('active', tab === 'all');
  document.getElementById('tabContent').classList.toggle('active', tab === 'content');
  document.getElementById('pendingView').style.display = tab === 'pending' ? 'block' : 'none';
  document.getElementById('allView').style.display = tab === 'all' ? 'block' : 'none';
  document.getElementById('contentView').style.display = tab === 'content' ? 'block' : 'none';
  if (tab === 'content') loadContent();
}

// ---------- Content editor ----------

let contentBlocks = [];

async function loadContent() {
  const list = document.getElementById('contentList');
  list.innerHTML = '<div style="padding:30px 16px;text-align:center;color:var(--tg-hint);font-size:13px">Загрузка блоков...</div>';

  const { data, error } = await _supabase
    .from('blocks')
    .select('id, order_num, letter, title_ru, title_en, subtitle_ru, subtitle_en, description_ru, description_en, content_ru, content_en, youtube_ru, youtube_en, color')
    .order('order_num');

  if (error) {
    list.innerHTML = '<div style="padding:30px 16px;text-align:center;color:#FF3B30;font-size:13px">Не удалось загрузить блоки.</div>';
    return;
  }

  contentBlocks = data || [];
  list.innerHTML = '';

  if (contentBlocks.length === 0) {
    list.innerHTML = '<div style="padding:30px 16px;text-align:center;color:var(--tg-hint)">Блоков нет.</div>';
    return;
  }

  contentBlocks.forEach(block => {
    const card = document.createElement('div');
    card.className = 'student-card';
    card.style.cursor = 'pointer';
    card.onclick = () => openEditor(block.id);
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:10px;background:${block.color || 'rgba(201,169,97,0.2)'};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0">${block.letter || block.order_num}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:15px;color:var(--tg-text)">Блок ${block.order_num}: ${block.title_ru || '—'}</div>
          <div style="font-size:12px;color:var(--tg-hint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${block.subtitle_ru || ''}</div>
        </div>
        <div style="font-size:13px;color:var(--gold);font-weight:600">✎ Изменить</div>
      </div>
    `;
    list.appendChild(card);
  });
}

function openEditor(blockId) {
  const block = contentBlocks.find(b => b.id === blockId);
  if (!block) return;

  document.getElementById('editorTitle').textContent = `Блок ${block.order_num}: ${block.title_ru || ''}`;
  document.getElementById('editBlockId').value = block.id;
  document.getElementById('editOrder').value = block.order_num || '';
  document.getElementById('editLetter').value = block.letter || '';
  document.getElementById('editTitleRu').value = block.title_ru || '';
  document.getElementById('editTitleEn').value = block.title_en || '';
  document.getElementById('editSubtitleRu').value = block.subtitle_ru || '';
  document.getElementById('editSubtitleEn').value = block.subtitle_en || '';
  document.getElementById('editDescRu').value = block.description_ru || '';
  document.getElementById('editDescEn').value = block.description_en || '';
  document.getElementById('editYtRu').value = block.youtube_ru || '';
  document.getElementById('editYtEn').value = block.youtube_en || '';
  document.getElementById('editContentRu').value = block.content_ru || '';
  document.getElementById('editContentEn').value = block.content_en || '';
  document.getElementById('editColor').value = block.color || '';
  document.getElementById('editorError').style.display = 'none';

  document.getElementById('editorModal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeEditor() {
  document.getElementById('editorModal').style.display = 'none';
  document.body.style.overflow = '';
}

async function saveBlock(e) {
  e.preventDefault();
  const btn = document.getElementById('saveBlockBtn');
  const errEl = document.getElementById('editorError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  const id = parseInt(document.getElementById('editBlockId').value, 10);
  const update = {
    order_num: parseInt(document.getElementById('editOrder').value, 10),
    letter: document.getElementById('editLetter').value.trim() || null,
    title_ru: document.getElementById('editTitleRu').value.trim(),
    title_en: document.getElementById('editTitleEn').value.trim() || null,
    subtitle_ru: document.getElementById('editSubtitleRu').value.trim() || null,
    subtitle_en: document.getElementById('editSubtitleEn').value.trim() || null,
    description_ru: document.getElementById('editDescRu').value.trim() || null,
    description_en: document.getElementById('editDescEn').value.trim() || null,
    youtube_ru: document.getElementById('editYtRu').value.trim() || null,
    youtube_en: document.getElementById('editYtEn').value.trim() || null,
    content_ru: document.getElementById('editContentRu').value || null,
    content_en: document.getElementById('editContentEn').value || null,
    color: document.getElementById('editColor').value.trim() || null,
  };

  const { error } = await _supabase.from('blocks').update(update).eq('id', id);

  if (error) {
    errEl.textContent = `Ошибка сохранения: ${error.message}`;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Сохранить';
    return;
  }

  toast('Блок сохранён', 'success');
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  closeEditor();
  await loadContent();
  btn.disabled = false;
  btn.textContent = 'Сохранить';
}

async function doLogout() {
  await _supabase.auth.signOut().catch(() => {});
  // Mini App в Telegram → закрываем приложение (выйти "по-настоящему" нельзя пока юзер сидит в боте)
  if (typeof tg !== 'undefined' && tg?.close && tg?.initData) {
    tg.close();
    return;
  }
  // Веб-режим → редирект
  window.location.href = 'index.html';
}

init();
</script>
</body>
</html>
