<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="КРЕСТ — тренажёр стихов Библии" />
  <title>Тренажёр стихов | КРЕСТ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="js/maintenance-gate.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .verse-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(201,169,97,0.2);
      border-radius: 16px;
      padding: 32px 24px;
      margin: 16px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .verse-reference {
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 20px;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 8px rgba(201,169,97,0.3);
    }
    .verse-text {
      font-size: 17px;
      line-height: 1.75;
      color: rgba(255,255,255,0.92);
      margin-bottom: 24px;
      display: none;
      font-weight: 500;
    }
    .verse-text.revealed { display: block; }
    .verse-actions {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 400px;
      padding: 0 16px;
    }
    .verse-actions .btn {
      flex: 1;
    }
    .verse-actions .btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(201,169,97,0.25);
      color: var(--gold);
    }
    .progress-indicator {
      text-align: center;
      font-size: 14px;
      color: var(--tg-hint);
      padding: 14px 0;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .completion-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 40px 20px;
      text-align: center;
    }
    .completion-screen .icon {
      font-size: 80px;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 16px rgba(201,169,97,0.3));
    }
    .completion-screen h2 {
      font-size: 24px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }
    .completion-screen p {
      font-size: 15px;
      color: var(--tg-hint);
      margin-bottom: 28px;
      font-weight: 500;
      line-height: 1.5;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 40px 20px;
      text-align: center;
      color: var(--tg-hint);
    }
    .empty-state .icon {
      font-size: 72px;
      margin-bottom: 20px;
      opacity: 0.4;
      filter: drop-shadow(0 2px 8px rgba(201,169,97,0.2));
    }
    .empty-state p {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }
    .mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201,169,97,0.15);
      border-radius: 12px;
      margin: 12px 16px 0;
      padding: 4px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      color: var(--tg-hint);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      background: none;
      letter-spacing: 0.2px;
    }
    .mode-btn.active {
      background: rgba(201,169,97,0.2);
      color: var(--gold);
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(201,169,97,0.2);
    }
    .block-badge {
      display: inline-block;
      background: rgba(201,169,97,0.15);
      color: var(--gold);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid rgba(201,169,97,0.3);
    }
  </style>
</head>
<body class="has-tab-bar">

<div id="loading">
  <div class="spinner"></div>
  <span>Загрузка...</span>
</div>

<div id="trainerView" style="display:none">
  <div class="page-header">
    <h1>✦ Тренажёр стихов</h1>
    <p id="trainerSubtitle">Учите стихи Библии</p>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeRef" onclick="setMode('ref')">📖 Ссылка → Текст</button>
    <button class="mode-btn" id="modeText" onclick="setMode('text')">✍️ Текст → Ссылка</button>
  </div>

  <div class="progress-indicator" id="progressIndicator"></div>

  <div id="verseContent"></div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let verses = [];
let allVerses = [];
let currentIndex = 0;
let knownVerses = [];
let isRevealed = false;
let trainerMode = 'ref'; // 'ref' = reference shown, recall text | 'text' = text shown, recall reference

function setMode(mode) {
  trainerMode = mode;
  document.getElementById('modeRef').classList.toggle('active', mode === 'ref');
  document.getElementById('modeText').classList.toggle('active', mode === 'text');
  // Reset with fresh copy
  verses = [...allVerses];
  knownVerses = [];
  currentIndex = 0;
  if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
  if (verses.length === 0) showEmptyState();
  else showVerse();
}

async function init() {
  const auth = await requireAuth();
  if (!auth) return;
  const { user, profile } = auth;

  const blocksUnlocked = profile.blocks_unlocked || 1;

  // Load global verse content (user_id IS NULL) for unlocked blocks
  const { data, error } = await _supabase
    .from('bible_verses')
    .select('id, block_id, reference, text_ru, order_num')
    .is('user_id', null)
    .lte('block_id', blocksUnlocked)
    .order('block_id')
    .order('order_num');

  if (error) {
    console.error(error);
    toast('Ошибка загрузки стихов', 'error');
    showLoading(false);
    return;
  }

  allVerses = data || [];
  verses = [...allVerses];

  showLoading(false);
  document.getElementById('trainerView').style.display = 'block';

  if (verses.length === 0) {
    showEmptyState();
  } else {
    showVerse();
  }

  // Telegram back button
  if (tg?.BackButton) {
    tg.BackButton.show();
    tg.BackButton.onClick(() => {
      window.location.href = './index.html';
    });
  }
}

function showEmptyState() {
  const content = document.getElementById('verseContent');
  content.innerHTML = `
    <div class="empty-state">
      <div class="icon">📖</div>
      <p>Стихи появятся после открытия блоков</p>
    </div>
  `;
  document.getElementById('progressIndicator').textContent = '';
}

function showVerse() {
  if (currentIndex >= verses.length) {
    showCompletion();
    return;
  }

  isRevealed = false;
  const verse = verses[currentIndex];
  const content = document.getElementById('verseContent');
  const blockNames = ['','Принцип Сотворения','Коренная Проблема','6 Состояний','3 Состояния','3 Работы Христа','7 Благословений'];

  if (trainerMode === 'ref') {
    // Show reference, hide text
    content.innerHTML = `
      <div class="verse-card">
        <div class="block-badge">Блок ${verse.block_id} · ${blockNames[verse.block_id] || ''}</div>
        <div class="verse-reference">${verse.reference}</div>
        <div class="verse-text" id="verseText">${verse.text_ru}</div>
      </div>
      <div class="verse-actions">
        <button class="btn" id="revealBtn" onclick="revealVerse()">Показать текст</button>
      </div>
    `;
  } else {
    // Show text, hide reference
    content.innerHTML = `
      <div class="verse-card">
        <div class="block-badge">Блок ${verse.block_id} · ${blockNames[verse.block_id] || ''}</div>
        <div class="verse-text revealed" style="display:block;margin-bottom:16px">${verse.text_ru}</div>
        <div class="verse-reference" id="verseRef" style="display:none;color:var(--gold)">${verse.reference}</div>
      </div>
      <div class="verse-actions">
        <button class="btn" id="revealBtn" onclick="revealVerse()">Показать ссылку</button>
      </div>
    `;
  }

  updateProgress();
}

function revealVerse() {
  if (isRevealed) return;
  isRevealed = true;

  if (trainerMode === 'ref') {
    const textEl = document.getElementById('verseText');
    if (textEl) textEl.classList.add('revealed');
  } else {
    const refEl = document.getElementById('verseRef');
    if (refEl) refEl.style.display = 'block';
  }

  const actionsEl = document.querySelector('.verse-actions');
  actionsEl.innerHTML = `
    <button class="btn btn-secondary" onclick="tryAgain()">Ещё раз ↩</button>
    <button class="btn" onclick="markKnown()">Знаю ✓</button>
  `;

  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

function markKnown() {
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  knownVerses.push(verses[currentIndex]);
  verses.splice(currentIndex, 1);

  if (verses.length === 0) {
    showCompletion();
  } else {
    if (currentIndex >= verses.length) currentIndex = 0;
    showVerse();
  }
}

function tryAgain() {
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

  // Move current verse to end of queue
  const verse = verses[currentIndex];
  verses.splice(currentIndex, 1);
  verses.push(verse);

  if (currentIndex >= verses.length) currentIndex = 0;
  showVerse();
}

function updateProgress() {
  const total = verses.length + knownVerses.length;
  const known = knownVerses.length;
  document.getElementById('progressIndicator').textContent = `${known} / ${total} стихов`;
}

function showCompletion() {
  const content = document.getElementById('verseContent');
  content.innerHTML = `
    <div class="completion-screen">
      <div class="icon">🎉</div>
      <h2>Все стихи выучены!</h2>
      <p>Отличная работа! Вы повторили ${knownVerses.length} ${knownVerses.length === 1 ? 'стих' : 'стихов'}.</p>
      <button class="btn" onclick="restart()">Повторить снова</button>
    </div>
  `;
  document.getElementById('progressIndicator').textContent = '';

  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function restart() {
  verses = [...knownVerses];
  knownVerses = [];
  currentIndex = 0;
  showVerse();
}

init();
</script>

<nav class="tab-bar-nav">
  <a href="index.html"><span class="tab-icon">🏠</span><span class="tab-label">Блоки</span></a>
  <a href="trainer.html" class="active"><span class="tab-icon">📖</span><span class="tab-label">Тренажёр</span></a>
  <a href="profile.html"><span class="tab-icon">👤</span><span class="tab-label">Профиль</span></a>
</nav>

</body>
</html>
