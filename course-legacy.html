<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CREST — Церковный курс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0071e3;--blue-dark:#0059b3;--blue-light:#e8f0fe;
  --bg:#f5f5f7;--surface:#fff;--surface2:#fafafa;
  --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
  --border:#d2d2d7;--radius:16px;--radius-sm:10px;
  --sw:280px;--shadow:0 2px 20px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-left:var(--sw)}

/* SIDEBAR */
#sidebar{position:fixed;top:0;left:0;width:var(--sw);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow:hidden}
#sidebar-inner{flex:1;overflow-y:auto;padding:0 0 40px}
#sidebar-inner::-webkit-scrollbar{width:4px}
#sidebar-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-brand h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.sidebar-brand p{font-size:12px;color:var(--text2);margin-top:2px}
.progress-wrap{padding:16px 20px;border-bottom:1px solid var(--border)}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px}
.progress-bar-bg{background:var(--bg);border-radius:4px;height:6px}
.progress-bar-fill{background:var(--blue);border-radius:4px;height:6px;transition:width .4s ease;width:0%}
.week-section{margin-top:8px}
.week-label{padding:12px 20px 6px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:background .15s}
.nav-item:hover{background:var(--bg)}
.nav-item.active{background:var(--blue-light)}
.nav-item.active .nav-title{color:var(--blue);font-weight:600}
.nav-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);flex-shrink:0;transition:all .2s}
.nav-item.done .nav-dot{background:var(--blue);border-color:var(--blue);color:#fff}
.nav-item.active .nav-dot{background:var(--blue);border-color:var(--blue);color:#fff}
.nav-title{font-size:13px;color:var(--text2);line-height:1.3}

/* TOPBAR */
#topbar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:200;align-items:center;padding:0 16px;gap:12px}
#topbar h1{font-size:16px;font-weight:700;flex:1}
#burger{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--text)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
#drawer{position:fixed;top:0;left:0;width:var(--sw);height:100vh;background:var(--surface);z-index:160;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
#drawer.open{transform:translateX(0)}
#overlay.open{display:block}

/* MAIN */
#main{min-height:100vh;padding:48px 40px 80px;max-width:860px}
#scroll-bar{position:fixed;top:0;left:var(--sw);right:0;height:3px;background:var(--blue);transform-origin:left;transform:scaleX(0);z-index:90}

/* LESSON */
.lesson-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-week{background:var(--blue-light);color:var(--blue)}
.badge-day{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.lesson-title{font-size:32px;font-weight:700;letter-spacing:-.5px;line-height:1.2;margin-bottom:8px}
.lesson-subtitle{font-size:17px;color:var(--text2);margin-bottom:32px}
.content-block{background:var(--surface);border-radius:var(--radius);padding:28px;margin-bottom:20px;box-shadow:var(--shadow)}
.content-block h3{font-size:15px;font-weight:600;color:var(--blue);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px}
.content-block p{color:var(--text);line-height:1.7;margin-bottom:12px}
.content-block p:last-child{margin-bottom:0}
.content-block ul,.content-block ol{padding-left:20px;margin-bottom:12px}
.content-block li{color:var(--text);line-height:1.7;margin-bottom:6px}
.verse{background:var(--blue-light);border-left:3px solid var(--blue);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 18px;margin:16px 0;font-style:italic;color:var(--text)}
.verse strong{font-style:normal;color:var(--blue);font-size:12px;display:block;margin-bottom:4px}
.key-point{background:linear-gradient(135deg,#0071e3 0%,#0059b3 100%);border-radius:var(--radius);padding:24px 28px;margin-bottom:20px;color:#fff}
.key-point h3{font-size:13px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.key-point p{font-size:16px;font-weight:500;line-height:1.6;opacity:.95}
.steps{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.step{display:flex;gap:14px;align-items:flex-start}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-text{line-height:1.6}
.step-text strong{display:block;color:var(--text)}
.step-text span{color:var(--text2);font-size:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.card-mini{background:var(--bg);border-radius:var(--radius-sm);padding:14px;border:1px solid var(--border)}
.card-mini strong{display:block;font-size:13px;color:var(--text);margin-bottom:4px}
.card-mini span{font-size:12px;color:var(--text2)}

/* QUESTIONS */
.questions{background:var(--surface);border-radius:var(--radius);padding:28px;margin-bottom:20px;box-shadow:var(--shadow)}
.questions h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.q-item{padding:12px 0;border-bottom:1px solid var(--border)}
.q-item:last-child{border-bottom:none;padding-bottom:0}
.q-item p{color:var(--text);line-height:1.6}

/* QUIZ */
.quiz-section{background:var(--surface);border-radius:var(--radius);padding:28px;margin-bottom:28px;box-shadow:var(--shadow)}
.quiz-section h3{font-size:15px;font-weight:600;margin-bottom:20px;color:var(--text)}
.quiz-q{margin-bottom:24px}
.quiz-q p{font-weight:500;color:var(--text);margin-bottom:12px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;font-size:14px;color:var(--text);text-align:left;background:var(--surface);display:flex;align-items:center;gap:10px;font-family:inherit}
.quiz-opt:hover:not(:disabled){border-color:var(--blue);background:var(--blue-light)}
.quiz-opt.correct{background:#d4f4e7;border-color:#34c759;color:#1a5c31}
.quiz-opt.wrong{background:#fde8e8;border-color:#ff3b30;color:#7a1a1a}
.quiz-opt:disabled{cursor:default}
.opt-icon{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .15s}
.quiz-opt.correct .opt-icon{background:#34c759;border-color:#34c759;color:#fff}
.quiz-opt.wrong .opt-icon{background:#ff3b30;border-color:#ff3b30;color:#fff}
.quiz-complete{background:linear-gradient(135deg,#34c759,#30a74d);border-radius:var(--radius-sm);padding:16px 20px;color:#fff;font-weight:600;text-align:center;margin-top:8px;display:none}
.quiz-score{font-size:22px;font-weight:700;margin-bottom:4px}

/* NAV BTNS */
.lesson-nav{display:flex;gap:12px;margin-top:8px;padding-top:8px}
.btn{padding:12px 24px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn:disabled{opacity:.5;cursor:default}

/* FINAL */
.final-badge{text-align:center;padding:40px 20px 20px}
.final-badge .icon{font-size:64px;margin-bottom:16px}
.final-badge h2{font-size:24px;font-weight:700;margin-bottom:8px}
.final-badge p{color:var(--text2)}

/* TABLE */
table{width:100%;border-collapse:collapse;margin:12px 0}
th{background:var(--bg);padding:10px 14px;text-align:left;font-size:13px;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text)}
tr:last-child td{border-bottom:none}

@media(max-width:900px){
  body{padding-left:0;padding-top:52px}
  #sidebar{display:none}
  #topbar{display:flex}
  #scroll-bar{left:0}
  #main{padding:28px 20px 80px}
  .lesson-title{font-size:24px}
  .grid-2{grid-template-columns:1fr}
}
@media(max-width:480px){
  #main{padding:20px 16px 80px}
  .content-block,.questions,.quiz-section{padding:20px}
  .lesson-title{font-size:20px}
  .btn{padding:11px 18px;font-size:14px}
}
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-inner">
    <div class="sidebar-brand">
      <h1>✝ CREST</h1>
      <p>4-недельный курс</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Прогресс</span>
        <span id="prog-text">0 / 20</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>
    </div>
    <nav id="sidebar-nav"></nav>
  </div>
</aside>

<div id="topbar">
  <button id="burger" onclick="toggleDrawer(true)" aria-label="Меню">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="19" y2="6"/><line x1="3" y1="11" x2="19" y2="11"/><line x1="3" y1="16" x2="19" y2="16"/>
    </svg>
  </button>
  <h1>✝ CREST</h1>
</div>
<div id="overlay" onclick="toggleDrawer(false)"></div>
<div id="drawer"><nav id="drawer-nav" style="padding:16px 0 40px"></nav></div>

<div id="scroll-bar"></div>
<main id="main"></main>

<script>
const WEEKS=["Неделя 1","Неделя 2","Неделя 3","Неделя 4"];
const lessons=[
{w:1,d:1,title:"Введение в курс CREST",sub:"Зачем изучать этот курс?",
content:`<div class="content-block"><h3>Что такое CREST?</h3><p>CREST — это аббревиатура, которая охватывает шесть ключевых истин христианской веры. Этот курс поможет вам понять: <strong>кем Бог создал человека, что пошло не так, почему ложные пути не работают, и что Бог сделал, чтобы всё исправить.</strong></p><p>За 4 недели — с понедельника по пятницу — мы последовательно пройдём всё учение. Каждый урок займёт 10–15 минут чтения и размышления.</p></div><div class="content-block"><h3>Структура курса</h3><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-text"><strong>Принцип Сотворения</strong><span>Кем создал Бог человека и в чём смысл жизни</span></div></div><div class="step"><div class="step-num">2</div><div class="step-text"><strong>Коренная Проблема</strong><span>Как и почему человек отдалился от Бога</span></div></div><div class="step"><div class="step-num">3</div><div class="step-text"><strong>6 Состояний Неверующего</strong><span>Последствия жизни без Бога</span></div></div><div class="step"><div class="step-num">4</div><div class="step-text"><strong>Три состояния мира</strong><span>Ложные пути, которыми идёт человечество</span></div></div><div class="step"><div class="step-num">5</div><div class="step-text"><strong>Три работы Христа</strong><span>Что Бог сделал, чтобы спасти человека</span></div></div><div class="step"><div class="step-num">6</div><div class="step-text"><strong>7 Благословений</strong><span>Что получает верующий вместе со спасением</span></div></div></div></div><div class="key-point"><h3>Главная мысль урока</h3><p>Этот курс — не просто информация. Это приглашение открыть или углубить живые отношения с Богом через понимание Его плана для человека.</p></div>`,
questions:["Что, по-вашему, значит знать Бога — это отношения или набор убеждений?","Какой из шести разделов кажется наиболее важным для вашей жизни сейчас?","Что вы хотите получить от этого курса?"],
quiz:[{q:"Сколько ключевых разделов охватывает курс CREST?",opts:["3","4","6","8"],a:2},{q:"Как долго длится этот курс?",opts:["2 недели","4 недели по пн–пт","1 месяц без выходных","3 недели"],a:1},{q:"Что является главной целью курса?",opts:["Изучить историю церкви","Открыть или углубить живые отношения с Богом","Выучить библейские стихи","Подготовиться к крещению"],a:1}]},

{w:1,d:2,title:"Бог — Источник жизни",sub:"Принцип Сотворения (часть 1)",
content:`<div class="content-block"><h3>Каков Бог?</h3><p>Бог сам является источником жизни и всего сущего. Его имя — <strong>«Сущий»</strong>, то есть Тот, Кто существует по Своей природе. Он не может не существовать.</p><p>Бог находится вне рамок материального мира и времени. Он сотворил материальный мир и человека, но Сам не ограничен ими.</p></div><div class="content-block"><h3>Из чего создан мир?</h3><div class="verse"><strong>Иоанна 1:1</strong>В начале было Слово, и Слово было у Бога, и Слово было Бог.</div><p>Бог есть Слово. Всё построено на Слове Бога. Весь материальный мир подчиняется Слову Бога. И только один человек может противиться этому Слову — это часть его свободы.</p></div><div class="content-block"><h3>Принцип счастья</h3><p>Бог вложил в каждое творение принцип счастья. Счастье — это нахождение в правильной среде обитания:</p><div class="grid-2"><div class="card-mini"><strong>🐟 Рыба</strong><span>Её среда — вода</span></div><div class="card-mini"><strong>🌳 Дерево</strong><span>Его среда — земля</span></div><div class="card-mini"><strong>🐦 Птица</strong><span>Её среда — небо</span></div><div class="card-mini"><strong>👤 Человек</strong><span>Его среда — Бог</span></div></div><p style="margin-top:14px">Человек — <strong>духовное существо</strong>. Его естественная среда обитания — Бог. Без Него человек вне своей среды — как рыба на берегу.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Бог — это не просто Творец, Он — единственная подлинная среда обитания для человека. Счастье возможно только в Нём.</p></div>`,
questions:["Что значит для вас «Бог — источник жизни»? Как это влияет на ежедневную жизнь?","Как вы понимаете мысль, что человек — духовное существо?","Приходилось ли вам искать счастье в том, что не могло его дать?"],
quiz:[{q:"Что означает имя Бога «Сущий»?",opts:["Создатель Земли","Тот, Кто существует по Своей природе","Бог войны","Всезнающий"],a:1},{q:"Какова естественная среда обитания человека?",opts:["Семья","Природа","Бог","Общество"],a:2},{q:"На чём построено всё сущее согласно Иоанна 1:1?",opts:["На законах физики","На Слове Бога","На вере людей","На силе природы"],a:1}]},

{w:1,d:3,title:"Человек по образу Бога",sub:"Принцип Сотворения (часть 2)",
content:`<div class="content-block"><h3>Что значит — по образу Бога?</h3><div class="verse"><strong>Бытие 1:27</strong>И сотворил Бог человека по образу Своему, по образу Божию сотворил его.</div><p>Важно понять: <strong>не Бог по образу человека, а человек по образу Бога.</strong> Это значит, что человек был создан носить в себе Божье мышление, Божью идеологию. Бог — это Слово. Человек по Его образу несёт в себе набор слов, идей, мировоззрения.</p></div><div class="content-block"><h3>Духовная личность</h3><div class="verse"><strong>Бытие 2:7</strong>И создал Господь Бог человека из праха земного, и вдунул в лице его дыхание жизни, и стал человек душою живою.</div><p>Изначально человек был «пустышкой» — не живым существом. Бог вдохнул в него Свой Дух. Это «дыхание» — Дух Божий. Внутри человека жил Бог. Первый человек знал Божье Слово на уровне сущности — ему не нужна была Библия.</p></div><div class="content-block"><h3>Следствие</h3><p>Человек — не просто биологическое существо. Он — <strong>духовная личность</strong>, созданная для отношений с Богом. Когда Бог внутри — человек знает правильное направление жизни.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Человек создан носить образ Бога — Его мышление и характер. Без этого он теряет свою истинную идентичность.</p></div>`,
questions:["Что значит «Бог живёт внутри человека»? Это абстракция или реальность?","Если человек думает исходя из слов, которые в него заложены, — какие слова заложены в вас?","Что меняется в вашем понимании себя, если вы — духовное существо по образу Бога?"],
quiz:[{q:"По чьему образу создан человек (Бытие 1:27)?",opts:["По образу природы","По образу ангелов","По образу Бога","По собственному замыслу"],a:2},{q:"Что произошло, когда Бог вдохнул в человека дыхание жизни?",opts:["Человек получил разум","Человек стал живым духовным существом","Человек получил власть над природой","Человек узнал будущее"],a:1},{q:"Из чего состоит «образ Бога» в человеке?",opts:["Из внешнего облика","Из Божьего мышления и идеологии","Из физической силы","Из способности к творчеству"],a:1}]},

{w:1,d:4,title:"Пять благословений Эдема",sub:"Принцип Сотворения (часть 3)",
content:`<div class="content-block"><h3>Благословение в раю</h3><div class="verse"><strong>Бытие 1:28</strong>И благословил их Бог, и сказал: плодитесь и размножайтесь, и наполняйте землю, и обладайте ею.</div><p>Бог не просто создал человека — Он благословил его. В материальном мире Бог дал пять видов благословения:</p></div><div class="content-block"><h3>Пять видов благословения</h3><div class="grid-2"><div class="card-mini"><strong>👨‍👩‍👧 Семья</strong><span>Любовь, отношения, принадлежность</span></div><div class="card-mini"><strong>💪 Здоровье</strong><span>Сила, полнота жизни</span></div><div class="card-mini"><strong>💰 Финансы</strong><span>Обеспечение, изобилие</span></div><div class="card-mini"><strong>🌿 Карьера</strong><span>Деятельность, развитие</span></div><div class="card-mini" style="grid-column:1/-1"><strong>👑 Власть</strong><span>Управление, ответственность за Землю</span></div></div><p style="margin-top:14px">Человек получил деятельность — наполнять землю, развивать её. Это <strong>активная жизнь с целью.</strong></p></div><div class="content-block"><h3>Высшее благословение — миссия</h3><p>Самое высшее — <strong>миссия:</strong> распространять по земле Божью идеологию. Это не просто работа, это смысл существования человека. Все остальные благословения служат этой миссии.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Бог создал человека для изобилия во всех сферах жизни. Через Христа эти благословения восстанавливаются.</p></div>`,
questions:["Какая из пяти сфер — семья, здоровье, финансы, карьера, власть — вам кажется наиболее важной? Почему?","Что означает «миссия» для обычного человека в XXI веке?","Как идея о том, что Бог хочет благословить вас во всех сферах, влияет на вашу молитву?"],
quiz:[{q:"Сколько видов благословения дал Бог человеку в Эдеме?",opts:["3","4","5","7"],a:2},{q:"Что является высшим благословением?",opts:["Богатство","Здоровье","Миссия","Семья"],a:2},{q:"Что означало повеление «наполняйте землю и обладайте ею»?",opts:["Заселить всю планету","Покорить животных","Активная жизнь с целью — развивать творение","Строить города"],a:2}]},

{w:1,d:5,title:"Завет Бога с человеком",sub:"Принцип Сотворения (часть 4)",
content:`<div class="content-block"><h3>Что такое завет?</h3><div class="verse"><strong>Бытие 2:16–17</strong>От всякого дерева в саду ты будешь есть, а от дерева познания добра и зла не ешь от него, ибо в день, в который ты вкусишь от него, смертью умрёшь.</div><p>Бог дал человеку не просто запрет — это был <strong>завет.</strong> Пока связь человека и Бога не нарушена — человек имеет жизнь. И эта жизнь — вечная.</p></div><div class="content-block"><h3>Смысл завета</h3><p>Завет — не тюрьма, а защита. Бог дал свободу есть от любого дерева. Одно ограничение указывало на источник жизни: <strong>жизнь — в послушании Богу, в доверии к Его Слову.</strong></p><p>Дерево познания добра и зла было предупреждением: попытка жить своим умом, без Бога — это смерть.</p></div><div class="content-block"><h3>Итог первой недели</h3><p>Бог создал человека:</p><ul><li>Как духовное существо по Своему образу</li><li>Для жизни в общении с Ним как в естественной среде</li><li>С пятью видами благословения и высшей миссией</li><li>С заветом, который обеспечивал вечную жизнь</li></ul><p>На следующей неделе — что пошло не так.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Завет — это не ограничение, а дар. Послушание Богу — это путь к жизни, а не к несвободе.</p></div>`,
questions:["Как вы понимаете смерть, о которой говорит Бог? Только физическая или есть другие виды?","Что значит «доверять Богу» в вашей конкретной жизненной ситуации?","Завет был нарушен человеком, а не Богом. Как это влияет на ваш взгляд на Бога?"],
quiz:[{q:"С чем связан завет Бога в Бытие 2:16–17?",opts:["С браком","С жизнью и смертью","С работой","С молитвой"],a:1},{q:"Что символизировало дерево познания добра и зла?",opts:["Знание наук","Попытку жить своим умом без Бога","Мудрость Бога","Власть над природой"],a:1},{q:"Что обеспечивало вечную жизнь по завету?",opts:["Добрые дела","Жертвоприношения","Послушание Богу и доверие Его Слову","Посещение храма"],a:2}]},

{w:2,d:6,title:"Что помешало человеку?",sub:"Коренная Проблема (часть 1)",
content:`<div class="content-block"><h3>Как разрушилась связь?</h3><p>Бог — всемогущий, вездесущий. Как разрушить связь с таким Богом? Только одним способом: <strong>уведя человека от Слова Бога.</strong></p><div class="verse"><strong>Суть жизни с Богом</strong>Пребывать с Богом через Его Слово — значит иметь все ответы для счастливой жизни. В Слове Бога есть всё, чтобы выстроить все сферы жизни так, как задумал Создатель.</div></div><div class="content-block"><h3>Три шага обольщения</h3><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-text"><strong>Сомнение</strong><span>«Подлинно ли сказал Бог?» — Если ты на 100% уверен в чём-то, нет смысла говорить иное. Сатана работает через сомнение.</span></div></div><div class="step"><div class="step-num">2</div><div class="step-text"><strong>Альтернатива</strong><span>«Нет, не умрёте» — предлагается другой путь. Если не Библия — то что? Если не Иисус — как спастись?</span></div></div><div class="step"><div class="step-num">3</div><div class="step-text"><strong>Желание</strong><span>«Увидела жена, что дерево вожделенно.» Желание рождается через слово, которое попало внутрь. Над чем размышляешь — к тому и придёшь.</span></div></div></div></div><div class="key-point"><h3>Главная мысль урока</h3><p>Грехопадение началось не с действия, а со слова — с принятия лжи. Защита от этого — твёрдость в Слове Божьем.</p></div>`,
questions:["Можете ли вы вспомнить момент, когда сомнение привело вас к неправильному решению?","Как вы защищаете своё мышление от ложных идей сегодня?","Почему «думать о чём-то» опасно, если это противоречит Слову Бога?"],
quiz:[{q:"Каким единственным способом можно разрушить связь с Богом?",opts:["Физической силой","Уведя от Слова Бога","Болезнью","Бедностью"],a:1},{q:"Каков первый шаг обольщения сатаны?",opts:["Предложить альтернативу","Вызвать желание","Породить сомнение","Показать запретное"],a:2},{q:"Откуда рождается желание согрешить?",opts:["Из физических потребностей","Из зависти к другим","Через слово (мысль), которое попало внутрь","Из усталости"],a:2}]},

{w:2,d:7,title:"Грехопадение и его последствия",sub:"Коренная Проблема (часть 2)",
content:`<div class="content-block"><h3>Что такое грех?</h3><div class="verse"><strong>Римлянам 3:23</strong>Потому что все согрешили и лишены славы Божией.</div><p>Грех — это <strong>неверие.</strong> Сомнение в Слове Бога и отказ подчиниться Ему. Когда слово сатаны вошло в человека, а Слово Божье вышло — произошла духовная смерть.</p></div><div class="content-block"><h3>Кто такой грешник?</h3><p>Грешник — это человек, <strong>отделённый от Бога</strong>, который не может или не хочет верить и подчиняться Слову Бога. Кому веришь — тот управляет твоей жизнью. Это духовный закон.</p></div><div class="content-block"><h3>Проблема сатаны</h3><div class="verse"><strong>Иоанна 8:44</strong>Ваш отец — дьявол... он лжец и отец лжи.</div><p>Дьявол взял власть над человеком через то, что человек согласился с ложью. Власть сатаны — это программа, которая фокусирует на ложных целях. Когда человек был с Богом — он хотел делать то, что говорит Бог. Начал слушать другое — начал делать другое. Отсюда все страдания, переживания — <strong>человек попал во власть судьбы.</strong></p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Грех — не список плохих поступков. Это разрыв отношений с Богом. Корень всех проблем — духовная смерть.</p></div>`,
questions:["Как меняется ваше понимание греха, если грех — это прежде всего неверие, а не дурные поступки?","«Кому веришь — тот управляет твоей жизнью» — кто управляет вашей жизнью прямо сейчас?","Что значит быть «во власти судьбы» в практическом смысле?"],
quiz:[{q:"Что такое грех по этому уроку?",opts:["Убийство или кража","Неверие и отказ подчиниться Слову Бога","Посещение плохих мест","Пренебрежение молитвой"],a:1},{q:"Как дьявол взял власть над человеком?",opts:["Через физическое насилие","Через болезни","Через то, что человек согласился с ложью","Через сны"],a:2},{q:"Что произошло духовно, когда человек поверил лжи?",opts:["Потерял способность слышать","Произошла духовная смерть — разрыв с Богом","Потерял здоровье","Потерял имущество"],a:1}]},

{w:2,d:8,title:"6 состояний неверующего (1–3)",sub:"Последствия жизни без Бога",
content:`<div class="content-block"><h3>Изменение статуса</h3><p>После грехопадения человек стал жить в шести состояниях. В первую очередь изменился его статус:</p></div><div class="content-block"><h3>Состояние 1: Чадо дьявола</h3><div class="verse"><strong>Ефесянам 2:1</strong>И вас, мёртвых по преступлениям и грехам вашим...</div><p>Чадо дьявола — это не сатанист. Это <strong>духовно мёртвый человек</strong> под властью духа лжи. Когда ты не веришь Богу — ты автоматически веришь в альтернативу. Покровительство сатаны — через культуру мира.</p></div><div class="content-block"><h3>Состояние 2: Идолопоклонство</h3><div class="verse"><strong>Ефесянам 2:2</strong>...по обычаю мира сего, по воле князя, господствующего в воздухе.</div><p>Идолопоклонство — не только поклонение ложным богам. На повседневном уровне это <strong>то, что играет роль Бога в нашей жизни.</strong> Чему ты посвящаешь жизнь? Семья как идол. Деньги как идол. Суть: возведение в абсолют вещей, данных Богом.</p></div><div class="content-block"><h3>Состояние 3: Психические проблемы</h3><div class="verse"><strong>Матфей 11:28</strong>Придите ко Мне все труждающиеся и обременённые, и Я успокою вас.</div><p>На пути к идолам мы переживаем. Достигли — боимся потерять. <strong>Тревога, страх, депрессия</strong> — это то, что сопровождает жизнь без Бога. Иисус, призывая «всех труждающихся», поставил всем диагноз.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Психологические проблемы имеют духовный корень. Попытка решить их без Бога — лечить симптомы, не касаясь причины.</p></div>`,
questions:["Что в вашей культуре чаще всего становится «идолом»?","Как вы понимаете связь между идолопоклонством и психологическими проблемами?","Приходилось ли вам замечать в себе тревогу, связанную с достижением целей?"],
quiz:[{q:"Что такое «чадо дьявола» по этому уроку?",opts:["Человек, занимающийся оккультизмом","Духовно мёртвый человек под властью лжи","Преступник","Атеист"],a:1},{q:"В чём суть идолопоклонства?",opts:["Поклонение языческим богам","Возведение в абсолют вещей вместо Бога","Отрицание Бога","Участие в сектах"],a:1},{q:"К кому обращался Иисус: «все труждающиеся и обременённые»?",opts:["Только к больным","Только к бедным","Ко всем людям, живущим без Бога","К фарисеям"],a:2}]},

{w:2,d:9,title:"6 состояний неверующего (4–6)",sub:"Цепочка духовных последствий",
content:`<div class="content-block"><h3>Состояние 4: Физические проблемы</h3><div class="verse"><strong>Деяния 8:7</strong>Из многих, имевших нечистых духов, те выходили, крича громким голосом; многие расслабленные и хромые исцелились.</div><p>Духовные проблемы проявляются в теле: болезни из-за стрессов, конфликты, бессонница, зависимости. За многими физическими проблемами стоят духовные причины — когда освобождались духовно, приходило исцеление.</p></div><div class="content-block"><h3>Состояние 5: Смерть — Суд — Ад</h3><div class="verse"><strong>Евреям 9:27</strong>И как человекам положено однажды умереть, а потом суд.</div><p>Это судьба каждого грешника. Не по принципу хороший/плохой — в ад идёт человек, который является чадом дьявола. Он просто <strong>идёт домой к своему отцу.</strong></p></div><div class="content-block"><h3>Состояние 6: Поколения</h3><div class="verse"><strong>Исход 20:5</strong>...наказывающий детей за вину отцов до третьего и четвёртого рода.</div><p>Существует духовный принцип передачи: мышление, страхи, грехи передаются из рода в род. Единственный выход — прийти ко Христу.</p></div><div class="content-block"><h3>Полная цепочка</h3><p>Покровительство сатаны → дух под его властью → переживания души → физические проблемы тела → смерть и суд → передача в поколениях.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Все шесть состояний — закономерный результат жизни вне Бога. Но у Бога есть ответ на каждое из них.</p></div>`,
questions:["Как вы понимаете связь духовного и физического здоровья?","Какие паттерны вы замечаете в своей семье из поколения в поколение?","Как весть о шести состояниях влияет на ваше желание рассказывать о Христе другим?"],
quiz:[{q:"По какому принципу человек попадает в ад?",opts:["По количеству грехов","По принципу хороший/плохой","Потому что является чадом дьявола","По решению ангелов"],a:2},{q:"Что передаётся из рода в род (Исход 20:5)?",opts:["Только болезни","Только имущество","Мышление, страхи, духовные проблемы","Только внешность"],a:2},{q:"Каков единственный выход из родовых проблем?",opts:["Обряды","Хорошие поступки","Прийти ко Христу","Изучить родословную"],a:2}]},

{w:2,d:10,title:"Итог: Причинно-следственная связь",sub:"Обзор Коренной Проблемы и 6 Состояний",
content:`<div class="content-block"><h3>Полная картина проблемы</h3><p>Прежде чем идти дальше, важно чётко увидеть полную картину. Это даст понять величину того, что сделал Христос.</p></div><div class="content-block"><h3>Цепочка от начала до конца</h3><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-text"><strong>Бог создал человека</strong><span>Духовным существом в общении с Ним, с миссией и благословениями</span></div></div><div class="step"><div class="step-num">2</div><div class="step-text"><strong>Сатана обольстил</strong><span>Через сомнение → альтернативу → желание</span></div></div><div class="step"><div class="step-num">3</div><div class="step-text"><strong>Человек принял ложь</strong><span>Духовная смерть — разрыв с Богом</span></div></div><div class="step"><div class="step-num">4</div><div class="step-text"><strong>6 состояний</strong><span>Власть сатаны → идолы → тревога → болезни → смерть → поколения</span></div></div></div></div><div class="content-block"><h3>Почему это важно знать?</h3><ul><li>Видеть корень проблем, а не только симптомы</li><li>Сострадать людям, а не осуждать их</li><li>Понять, почему Христос — единственное решение</li><li>Объяснять Евангелие ясно и убедительно</li></ul></div><div class="key-point"><h3>Главная мысль урока</h3><p>Человек не стал плохим — он стал мёртвым духовно. Это не моральная, а духовная проблема. И Бог знал об этом ещё до сотворения мира.</p></div>`,
questions:["Как знание этой цепочки меняет ваш взгляд на «плохих людей» вокруг вас?","Как бы вы объяснили эту цепочку другу, который не верит в Бога?","Что вас больше всего удивляет в этой картине грехопадения?"],
quiz:[{q:"Что является корнем всех шести состояний неверующего?",opts:["Бедность","Плохое воспитание","Духовная смерть — разрыв с Богом","Отсутствие образования"],a:2},{q:"Как называется первый шаг обольщения?",opts:["Желание","Альтернатива","Сомнение","Гордость"],a:2},{q:"Почему понимание 6 состояний важно для евангелизации?",opts:["Чтобы осуждать грешников","Чтобы видеть корень проблем и сострадать","Чтобы бояться сатаны","Чтобы избегать грешников"],a:1}]},

{w:3,d:11,title:"Религиозное и мистическое мышление",sub:"Три состояния мира (часть 1)",
content:`<div class="content-block"><h3>Как люди ищут Бога?</h3><p>Все люди чувствуют духовную пустоту. Но то мышление, которое заложено миром, ведёт по ложным путям. В мире сформировались три ложных состояния, которые подменяют истину.</p></div><div class="content-block"><h3>1. Религиозное мышление</h3><p>Бог привязывается к обрядам, местам, символике. Люди думают: если носить крестик, нырнуть в источник — Бог начнёт действовать. Акцент — не на познании Слова, а на действиях. Бог ищется в ритуалах, но сердце не меняется.</p><div class="verse"><strong>Деяния 4:12</strong>Нет другого имени под небом, данного человекам, которым надлежало бы нам спастись.</div></div><div class="content-block"><h3>2. Мистическое мышление</h3><p>Люди стремятся заполнить духовную пустоту <strong>переживаниями.</strong> Ищут чувства, мурашки, ощущения необычного. Через медитации, практики — ищут покой, но не находят Бога. Мистика может давать переживания — но это не истина, а обольщение.</p><div class="verse"><strong>Колоссянам 2:8</strong>Смотрите, чтобы кто не увлёк вас философиею и пустым обольщением, по преданию человеческому, по стихиям мира, а не по Христу.</div></div><div class="key-point"><h3>Главная мысль урока</h3><p>Религиозность без отношений с Богом и мистика без Христа — попытки залить духовную пустоту тем, что не может её заполнить.</p></div>`,
questions:["Встречали ли вы людей с религиозным мышлением? Как вы с ними общались?","Что опасного в мистическом поиске — медитациях, эзотерике?","Чем христианство отличается от религиозного мышления?"],
quiz:[{q:"В чём суть религиозного мышления?",opts:["Изучение Библии","Поиск Бога через обряды, не меняя сердце","Молитва каждый день","Посещение церкви"],a:1},{q:"Что ищут люди с мистическим мышлением?",opts:["Практические знания","Общение с людьми","Духовные переживания и ощущения","Финансовое благополучие"],a:2},{q:"Что говорит Деяния 4:12?",opts:["Можно спастись через добрые дела","Нет другого имени для спасения кроме Иисуса","Спасение через крещение","Спасение доступно всем религиям"],a:1}]},

{w:3,d:12,title:"Языческое мышление и три ложных пути",sub:"Три состояния мира (часть 2)",
content:`<div class="content-block"><h3>3. Языческое мышление</h3><p>Язычество — от слова «языки» (народы). Верования из культуры и традиций. Сегодня это хобби, увлечения, карьера, красивое тело, реализация. Люди посвящают себя этим вещам, хотя только Бог может заполнить духовную пустоту.</p></div><div class="content-block"><h3>Три ложных пути к Богу</h3><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-text"><strong>Религия</strong><span>«Если буду правильно жить по правилам — встречусь с Богом». Но спасение только через Христа (Деян. 4:12)</span></div></div><div class="step"><div class="step-num">2</div><div class="step-text"><strong>Философия / мистика</strong><span>«Истину найду в знаниях». Но ложные знания укрепляют заблуждение (Кол. 2:8)</span></div></div><div class="step"><div class="step-num">3</div><div class="step-text"><strong>Добрые дела</strong><span>«Хорошие поступки спасут». Но: «вся праведность наша — как запачканная одежда» (Ис. 64:6)</span></div></div></div></div><div class="content-block"><h3>Итог</h3><p>Религия, философия и добрые дела не способны решить корень проблемы. Человеческие усилия работают на уровне следствий, не достигая причины. Единственный путь — <strong>вера в Иисуса Христа.</strong></p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Бог не нуждается в наших ритуалах или достижениях. Он ждёт веры в то, что Он уже сделал через Христа.</p></div>`,
questions:["К какому из трёх ложных путей вы были ближе всего до прихода ко Христу?","Как объяснить человеку, что добрые дела не спасают, не обидев его?","Почему люди так цепляются за «самоспасение»?"],
quiz:[{q:"Откуда происходит слово «язычество»?",opts:["От слова «язык» (речь)","От слова «языки» (народы)","От слова «языческий» (грубый)","Из латыни"],a:1},{q:"Что говорит Исайя 64:6 о праведности человека?",opts:["Она важна для Бога","Она как запачканная одежда","Она приводит к спасению","Она угодна Богу"],a:1},{q:"Что является единственным путём к Богу?",opts:["Добрые дела + вера","Вера в Иисуса Христа","Религиозные обряды","Духовные практики"],a:1}]},

{w:3,d:13,title:"Бог приходит к человеку",sub:"Три работы Христа (часть 1)",
content:`<div class="content-block"><h3>Инициатива Бога</h3><div class="verse"><strong>Римлянам 5:8</strong>Бог доказал нам Свою любовь тем, что Христос умер за нас, пока мы были ещё грешниками.</div><p>Человек не способен сам прийти к Богу. Все три пути — религия, мистика, добрые дела — ведут мимо. Поэтому Бог приходит к человеку Сам. Это <strong>полностью Божья инициатива.</strong></p></div><div class="content-block"><h3>Иисус Христос: значение имён</h3><div class="grid-2"><div class="card-mini"><strong>Иисус</strong><span>«Спаситель» — рождён с единственной целью: спасти человека</span></div><div class="card-mini"><strong>Христос</strong><span>«Помазанник» — Божья сила для исполнения воли Бога</span></div></div><p style="margin-top:14px">Его миссия была запланирована <strong>до создания мира.</strong></p></div><div class="content-block"><h3>Три функции Христа</h3><div class="grid-2"><div class="card-mini"><strong>🗣 Пророк</strong><span>Приносит Слово Бога, показывает путь</span></div><div class="card-mini"><strong>🕊 Священник</strong><span>Приносит жертву, примиряет с Богом</span></div><div class="card-mini" style="grid-column:1/-1"><strong>👑 Царь</strong><span>Устанавливает закон и порядок в Своём царстве</span></div></div></div><div class="key-point"><h3>Главная мысль урока</h3><p>Бог не ждал, пока мы станем лучше. Он пришёл к нам в момент, когда мы были грешниками. Это и есть настоящая любовь.</p></div>`,
questions:["Что для вас значит, что Бог пришёл к людям первым?","Что означает, что спасение — план Бога до создания мира?","Какое из трёх служений — Пророка, Священника, Царя — кажется вам наиболее значимым?"],
quiz:[{q:"Что означает имя «Иисус»?",opts:["Сын Бога","Спаситель","Царь","Учитель"],a:1},{q:"Что означает слово «Христос»?",opts:["Мессия по-гречески","Помазанник — Божья сила","Священник","Пророк"],a:1},{q:"Когда был запланирован план спасения?",opts:["После грехопадения","Во время Ноя","До создания мира","Во времена Авраама"],a:2}]},

{w:3,d:14,title:"Христос: Пророк и Священник",sub:"Три работы Христа (часть 2)",
content:`<div class="content-block"><h3>Первая функция: Пророк</h3><div class="verse"><strong>Иоанна 14:6</strong>Я путь, истина и жизнь. Никто не приходит к Отцу, как только через Меня.</div><p>Функция пророка — принести людям Божий ответ, донести путь. Иисус <strong>показал путь к Богу</strong> и, указав на Себя, сказал: «Вот куда идите». Таким образом Он решил проблему ухода от Бога.</p></div><div class="content-block"><h3>Вторая функция: Священник</h3><p>Ветхозаветные священники имели власть отпускать грехи через жертву — кровь чистых животных. Но это нужно было повторять каждый год.</p><p>Христос выступил в роли <strong>Агнца.</strong> Будучи Богом, Он позволил распять Себя и таким образом <strong>искупил нас навсегда.</strong></p><div class="verse"><strong>Римлянам 8:2</strong>Закон духа жизни во Христе Иисусе освободил меня от закона греха и смерти.</div><p>Он искупил грехи прошлого, настоящего и будущего. Теперь не нужен посредник — ты можешь сам исповедовать перед Богом.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Как Пророк — Христос указал путь. Как Священник — Он уплатил цену. Оба действия полны, окончательны и достаточны.</p></div>`,
questions:["Что значит для вас лично, что Иисус — «путь, истина и жизнь»?","Как понимание жертвы Христа меняет вашу молитву об исповеди грехов?","Что означает, что грехи прошлого, настоящего и будущего уже искуплены?"],
quiz:[{q:"Какую проблему решил Христос как Пророк?",opts:["Проблему болезней","Проблему бедности","Проблему ухода от Бога — указал путь назад","Проблему смерти"],a:2},{q:"Чем жертва Христа отличается от ветхозаветных жертв?",opts:["Она была более символичной","Она навсегда искупила все грехи — без повторения","Она была только для евреев","Она заменила крещение"],a:1},{q:"Что означает Римлянам 8:2?",opts:["Не нужно бороться с грехом","Верующий освобождён от закона греха и смерти","Он стал безгрешным","Он автоматически попадёт в рай"],a:1}]},

{w:3,d:15,title:"Христос: Царь и Спасение",sub:"Три работы Христа (часть 3)",
content:`<div class="content-block"><h3>Третья функция: Царь</h3><div class="verse"><strong>1 Иоанна 3:8</strong>Для того и пришёл Сын Божий, чтобы разрушить дела дьявола.</div><p>Задача царя — приносить порядок и закон в своё царство. Христос принёс <strong>закон духа жизни.</strong> Если ты жил по закону греха — теперь ты получаешь свободу, прощение, новую самооценку, миссию.</p><p>Христос — единственный, кто имел власть над сатаной. Чтобы уволить начальника — должен прийти его начальник.</p></div><div class="content-block"><h3>Как принять спасение?</h3><div class="verse"><strong>Римлянам 10:9–10</strong>Если устами своими исповедуешь Иисуса Господом и сердцем веруешь, что Бог воскресил Его из мёртвых — спасёшься.</div><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-text"><strong>Поверить в послание</strong><span>Принять как истину, что Иисус умер за мои грехи и воскрес</span></div></div><div class="step"><div class="step-num">2</div><div class="step-text"><strong>Исповедовать вслух</strong><span>Произнести веру — всё духовное передаётся через слово</span></div></div><div class="step"><div class="step-num">3</div><div class="step-text"><strong>Принять Христа как Господа</strong><span>Не только Спасителя, но и Господа — отдать Ему управление жизнью</span></div></div></div></div><div class="key-point"><h3>Главная мысль урока</h3><p>Спасение — не сложная система. Это личный выбор: поверить и исповедать, что Иисус — Господь. Это меняет всё.</p></div>`,
questions:["Что значит принять Иисуса как «Господа», а не только Спасителя?","Почему так важно «исповедовать устами», а не только верить в сердце?","Вы уже сделали этот шаг? Что изменилось после этого?"],
quiz:[{q:"Какую проблему решил Христос как Царь?",opts:["Проблему бедности","Власть сатаны — разрушил дела дьявола","Проблему болезней","Религиозные законы"],a:1},{q:"Что нужно для спасения согласно Рим. 10:9–10?",opts:["Крещение и добрые дела","Посещение церкви","Исповедовать устами и верить сердцем","Изучить всю Библию"],a:2},{q:"Почему только Иисус имел власть над сатаной?",opts:["Потому что Он был человеком","Потому что Он был Богом — Сам Бог имеет власть над сатаной","Потому что Он был пророком","Потому что Он постился 40 дней"],a:1}]},

{w:4,d:16,title:"Новый статус и Святой Дух",sub:"7 Благословений верующего (1–2)",
content:`<div class="content-block"><h3>Что произошло, когда вы приняли Христа?</h3><p>Принятие спасения — духовный метод. Всё духовное передаётся в наш мир через слово. Поэтому то, во что ты веришь, нужно произносить вслух.</p></div><div class="content-block"><h3>Благословение 1: Новый статус — чадо Бога</h3><div class="verse"><strong>Иоанна 1:12</strong>Тем, кто принял Его, дал власть быть чадами Божьими.</div><p>Ты больше не просто творение Бога — ты теперь <strong>Его сын или дочь.</strong> Это не результат усилий — подарок через веру. Рождаясь свыше, ты становишься частью Его семьи. Ты больше не сирота. У тебя есть доступ к Отцу.</p></div><div class="content-block"><h3>Благословение 2: Святой Дух живёт в тебе</h3><div class="verse"><strong>1 Коринфянам 3:16</strong>Разве не знаете, что вы храм Божий, и Дух Божий живёт в вас?</div><p>Бог больше не где-то на небе. Он <strong>внутри тебя.</strong> Не приходит и уходит — поселился. Его Дух — Личность, которая с тобой 24/7. Это суть спасения: Бог снова с человеком, как в Эдеме.</p><ul><li>Учит и открывает истину</li><li>Обличает и направляет</li><li>Даёт силу против греха</li><li>Ведёт в ежедневной жизни</li></ul></div><div class="key-point"><h3>Главная мысль урока</h3><p>Ты уже не сирота. Внутри тебя — живой Бог. Это восстановление того, что было в Эдеме — и даже больше.</p></div>`,
questions:["Как ощущение себя «чадом Бога» влияет на вашу самооценку?","Как вы на практике взаимодействуете со Святым Духом в ежедневной жизни?","Что меняется, если Бог не «где-то в небе», а живёт внутри тебя?"],
quiz:[{q:"Что происходит с верующим согласно Иоанна 1:12?",opts:["Он получает власть творить чудеса","Он получает власть быть чадом Бога","Он становится безгрешным","Он получает финансовые благословения"],a:1},{q:"Где живёт Святой Дух по 1 Коринфянам 3:16?",opts:["В церкви","На небесах","В верующем человеке","В Библии"],a:2},{q:"Что НЕ делает Святой Дух согласно уроку?",opts:["Учит истине","Обличает и направляет","Принимает решения вместо человека","Даёт силу против греха"],a:2}]},

{w:4,d:17,title:"Молитва и служение ангелов",sub:"7 Благословений верующего (3–4)",
content:`<div class="content-block"><h3>Благословение 3: Ответы на молитвы</h3><div class="verse"><strong>Иоанна 14:14</strong>Если чего попросите во имя Моё — Я то сделаю.</div><p>Ты не просто можешь говорить с Богом — ты можешь <strong>ожидать, что Он услышит и ответит.</strong> Молитва — это сотрудничество с Богом. Ты не выпрашиваешь милостыню — ты исполняешь Его волю, и Он отвечает.</p></div><div class="content-block"><h3>Благословение 4: Служение ангелов</h3><div class="verse"><strong>Евреям 1:14</strong>Не все ли они суть служебные духи, посылаемые на служение для тех, кто наследует спасение?</div><p>Ты не один. С тобой — <strong>ангелы:</strong> реальные духовные существа, которые защищают, приносят ответы, устраивают обстоятельства. Когда ты молишься — в духовном мире происходит действие.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Ты имеешь прямой доступ к Богу через молитву и окружён духовной защитой. Ты не один ни в одну минуту своей жизни.</p></div>`,
questions:["Как изменилось бы ваше отношение к молитве, если вы верите, что Бог отвечает?","Как вы понимаете служение ангелов в вашей жизни? Это реальность или теория?","Что означает молиться «во имя Иисуса» — это формула или смысл?"],
quiz:[{q:"Что такое молитва по этому уроку?",opts:["Список просьб к Богу","Религиозный ритуал","Сотрудничество с Богом для исполнения Его воли","Медитация"],a:2},{q:"Для кого посланы ангелы (Евреям 1:14)?",opts:["Для всех людей","Для священников","Для тех, кто наследует спасение","Для пасторов"],a:2},{q:"Что происходит в духовном мире, когда верующий молится?",opts:["Ничего особенного","Духовные существа начинают действие","Ангелы записывают молитву","Бог решает, стоит ли отвечать"],a:1}]},

{w:4,d:18,title:"Власть над тьмой и небесное гражданство",sub:"7 Благословений верующего (5–6)",
content:`<div class="content-block"><h3>Благословение 5: Власть над силами тьмы</h3><div class="verse"><strong>Луки 10:19</strong>Се, даю вам власть наступать на змей и скорпионов и на всю силу вражью, и ничто не повредит вам.</div><p>Ты больше не жертва духовных атак. Ты имеешь власть изгонять бесов, разрушать ложь, молиться с результатом. Применять власть — это <strong>не просить, а приказывать,</strong> как делает руководитель.</p></div><div class="content-block"><h3>Благословение 6: Жительство на небесах</h3><div class="verse"><strong>Филиппийцам 3:20</strong>Наше жительство — на небесах, откуда мы ожидаем Спасителя.</div><p>Твоё гражданство изменено. Ты принадлежишь Царству Небесному. Здесь ты <strong>временный житель,</strong> а твой дом — у Отца. Ты не боишься смерти. Ты живёшь с вечной перспективой.</p></div><div class="key-point"><h3>Главная мысль урока</h3><p>Ты — гражданин Небесного Царства с властью Христа. Это меняет и то, как ты живёшь на земле, и как ты смотришь на вечность.</p></div>`,
questions:["Как понимание своей власти во Христе влияет на то, как вы противостоите страхам?","Что значит практически «жить с вечной перспективой» в ежедневных делах?","Как небесное гражданство освобождает от страха смерти?"],
quiz:[{q:"Что значит применять власть над тьмой?",opts:["Просить Бога изгнать бесов","Молиться как можно громче","Приказывать, зная свою власть во Христе","Поститься 40 дней"],a:2},{q:"Где наше жительство (Филиппийцам 3:20)?",opts:["На земле","На небесах","В церкви","В сердце"],a:1},{q:"Как небесное гражданство влияет на страх смерти?",opts:["Не влияет","Усиливает страх","Освобождает — смерть становится переходом домой","Заставляет думать о смерти чаще"],a:2}]},

{w:4,d:19,title:"Смысл жизни — Божья цель",sub:"7 Благословений верующего (7)",
content:`<div class="content-block"><h3>Благословение 7: Божья цель</h3><div class="verse"><strong>Матфея 28:19–20</strong>Идите, научите все народы, крестя их во имя Отца и Сына и Святого Духа...</div><p>Бог дал тебе цель, которую <strong>невозможно разрушить.</strong> Не деньги, не семья, не успех — а исполнение Божьей воли: ставить учеников, утверждать Церковь, распространять Царство. Даже в тюрьме, даже в бедности — ты продолжаешь быть полезным для Царства.</p></div><div class="content-block"><h3>Итог всех семи благословений</h3><div class="steps"><div class="step"><div class="step-num">1</div><div class="step-text"><strong>Новый статус</strong><span>Ты — чадо Бога, не сирота</span></div></div><div class="step"><div class="step-num">2</div><div class="step-text"><strong>Святой Дух</strong><span>Бог живёт внутри тебя</span></div></div><div class="step"><div class="step-num">3</div><div class="step-text"><strong>Молитва</strong><span>Прямой доступ к Отцу</span></div></div><div class="step"><div class="step-num">4</div><div class="step-text"><strong>Ангелы</strong><span>Духовная защита и помощь</span></div></div><div class="step"><div class="step-num">5</div><div class="step-text"><strong>Власть</strong><span>Над силами тьмы</span></div></div><div class="step"><div class="step-num">6</div><div class="step-text"><strong>Гражданство</strong><span>Вечная жизнь с Богом</span></div></div><div class="step"><div class="step-num">7</div><div class="step-text"><strong>Миссия</strong><span>Цель, которую нельзя разрушить</span></div></div></div></div><div class="key-point"><h3>Главная мысль урока</h3><p>Самое великое благословение — знать, кто ты, с кем ты, и зачем ты живёшь. Ты принят, поселён, вооружён, обеспечен и направлен.</p></div>`,
questions:["Как Великое Поручение (Матфея 28) применимо к вашей конкретной жизни прямо сейчас?","Что значит «миссия, которую нельзя разрушить»? Это реальность для вас или теория?","Какие из семи благословений вы уже переживаете в своей жизни?"],
quiz:[{q:"Что является седьмым благословением верующего?",opts:["Финансовое изобилие","Здоровье","Божья цель — миссия, которую нельзя разрушить","Успех в карьере"],a:2},{q:"В чём суть Великого Поручения (Матфея 28:19–20)?",opts:["Строить церкви","Раздавать деньги","Идти и делать учеников всех народов","Молиться каждый день"],a:2},{q:"Чем отличается Божья миссия от обычных целей?",opts:["Приносит больше денег","Её нельзя разрушить ни обстоятельствами ни людьми","Требует меньше усилий","Видна только духовным людям"],a:1}]},

{w:4,d:20,title:"Итоговый урок",sub:"Финальное повторение курса CREST",
content:`<div class="final-badge"><div class="icon">🎓</div><h2>Поздравляем! Вы прошли курс CREST</h2><p>Вы изучили полное библейское основание для понимания человека, греха и спасения.</p></div><div class="content-block"><h3>Полная картина CREST</h3><table><tr><th>#</th><th>Раздел</th><th>Ключевая истина</th></tr><tr><td>1</td><td>Принцип Сотворения</td><td>Человек создан для общения с Богом</td></tr><tr><td>2</td><td>Коренная Проблема</td><td>Ложь разорвала связь с Богом</td></tr><tr><td>3</td><td>6 Состояний неверующего</td><td>Жизнь без Бога — путь к смерти</td></tr><tr><td>4</td><td>3 Состояния мира</td><td>Человеческие пути не ведут к Богу</td></tr><tr><td>5</td><td>3 Работы Христа</td><td>Бог Сам пришёл и решил проблему</td></tr><tr><td>6</td><td>7 Благословений</td><td>Верующий принят, поселён и направлен</td></tr></table></div><div class="content-block"><h3>Как жить этим дальше?</h3><ul><li><strong>Слово</strong> — ежедневно читать Библию, питать разум Словом Бога</li><li><strong>Молитва</strong> — сотрудничество с Богом, не список просьб</li><li><strong>Общение</strong> — церковь это семья, не посещение мероприятий</li><li><strong>Служение</strong> — применять власть и миссию в жизни</li><li><strong>Свидетельство</strong> — рассказывать другим то, что узнали здесь</li></ul></div><div class="key-point"><h3>Заключительная мысль</h3><p>«Самое великое благословение — знать, кто ты, с кем ты, и зачем ты живёшь.» Ты — чадо Бога, Дух живёт в тебе, и у тебя есть миссия, которую нельзя разрушить.</p></div>`,
questions:["Какой урок курса изменил ваше мышление больше всего?","Как вы объясните курс CREST своими словами за 2–3 минуты?","Какой следующий шаг в вашей вере вы готовы сделать?"],
quiz:[{q:"Что является корнем всех проблем человека?",opts:["Бедность","Плохое воспитание","Духовная смерть — разрыв с Богом","Болезни"],a:2},{q:"Что сделал Христос как Пророк?",opts:["Совершил жертву за грехи","Победил сатану","Указал путь к Богу","Исцелял больных"],a:2},{q:"Что получает верующий как первое из семи благословений?",opts:["Финансовое изобилие","Новый статус — чадо Бога","Ангельскую охрану","Власть над болезнями"],a:1}]}
];

let current=parseInt(localStorage.getItem('crest_cur')||'0');
let done=JSON.parse(localStorage.getItem('crest_done')||'[]');
const quizState={};

function save(){localStorage.setItem('crest_cur',current);localStorage.setItem('crest_done',JSON.stringify(done));}

function renderNav(el){
  el.innerHTML='';
  let wk=0;
  lessons.forEach((l,i)=>{
    if(l.w!==wk){
      wk=l.w;
      const s=document.createElement('div');s.className='week-section';
      const lb=document.createElement('div');lb.className='week-label';lb.textContent=WEEKS[wk-1];
      s.appendChild(lb);el.appendChild(s);
    }
    const item=document.createElement('div');
    const isDone=done.includes(i);
    item.className='nav-item'+(i===current?' active':'')+(isDone&&i!==current?' done':'');
    item.onclick=()=>goto(i);
    const dot=document.createElement('div');dot.className='nav-dot';
    dot.textContent=isDone&&i!==current?'✓':l.d;
    const title=document.createElement('div');title.className='nav-title';title.textContent='День '+l.d+': '+l.title;
    item.appendChild(dot);item.appendChild(title);
    el.querySelector('.week-section:last-child').appendChild(item);
  });
}

function renderAllNav(){
  renderNav(document.getElementById('sidebar-nav'));
  renderNav(document.getElementById('drawer-nav'));
}

function renderProgress(){
  const pct=Math.round(done.length/lessons.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=done.length+' / '+lessons.length;
}

function renderLesson(idx){
  const l=lessons[idx];
  const qHTML=l.questions.map((q,i)=>'<div class="q-item"><p>'+(i+1)+'. '+q+'</p></div>').join('');
  const quizHTML=l.quiz.map((q,qi)=>{
    const optsHTML=q.opts.map((o,oi)=>
      '<button class="quiz-opt" onclick="checkAnswer('+idx+','+qi+','+oi+',this)">'+
      '<span class="opt-icon"></span>'+o+'</button>'
    ).join('');
    return '<div class="quiz-q" id="qq-'+idx+'-'+qi+'"><p>'+(qi+1)+'. '+q.q+'</p><div class="quiz-options">'+optsHTML+'</div></div>';
  }).join('');
  const prevDis=idx===0?'disabled':'';
  const nextLbl=idx===lessons.length-1?'Финиш 🎉':'Следующий урок →';
  document.getElementById('main').innerHTML=
    '<div class="lesson-meta">'+
    '<span class="badge badge-week">'+WEEKS[l.w-1]+'</span>'+
    '<span class="badge badge-day">День '+l.d+'</span></div>'+
    '<h1 class="lesson-title">'+l.title+'</h1>'+
    '<p class="lesson-subtitle">'+l.sub+'</p>'+
    l.content+
    '<div class="questions"><h3>💬 Вопросы для размышления</h3>'+qHTML+'</div>'+
    '<div class="quiz-section"><h3>✅ Проверь себя</h3>'+quizHTML+
    '<div class="quiz-complete" id="qc-'+idx+'"><div class="quiz-score" id="qs-'+idx+'"></div><div>Урок завершён!</div></div></div>'+
    '<div class="lesson-nav">'+
    '<button class="btn btn-secondary" onclick="goto('+(idx-1)+')" '+prevDis+'>← Назад</button>'+
    '<button class="btn btn-primary" onclick="nextLesson('+idx+')">'+nextLbl+'</button></div>';
  window.scrollTo(0,0);
}

function checkAnswer(li,qi,oi,btn){
  const l=lessons[li];
  if(!quizState[li])quizState[li]={answers:{},score:0};
  if(quizState[li].answers[qi]!==undefined)return;
  quizState[li].answers[qi]=oi;
  const correct=l.quiz[qi].a===oi;
  if(correct)quizState[li].score++;
  btn.closest('.quiz-options').querySelectorAll('.quiz-opt').forEach(b=>{
    b.disabled=true;
    const boi=Array.from(b.parentNode.children).indexOf(b);
    const isRight=boi===l.quiz[qi].a;
    if(isRight){b.classList.add('correct');b.querySelector('.opt-icon').textContent='✓';}
    else if(boi===oi&&!correct){b.classList.add('wrong');b.querySelector('.opt-icon').textContent='✗';}
  });
  if(Object.keys(quizState[li].answers).length===l.quiz.length){
    const sc=quizState[li].score,tot=l.quiz.length;
    document.getElementById('qs-'+li).textContent=sc+' / '+tot+' правильно';
    document.getElementById('qc-'+li).style.display='block';
    if(!done.includes(li)){done.push(li);save();}
    renderProgress();renderAllNav();
  }
}

function goto(idx){
  if(idx<0||idx>=lessons.length)return;
  current=idx;save();renderLesson(idx);renderAllNav();toggleDrawer(false);
}

function nextLesson(idx){
  if(!done.includes(idx)){done.push(idx);save();}
  renderProgress();renderAllNav();
  if(idx<lessons.length-1)goto(idx+1);
}

function toggleDrawer(open){
  document.getElementById('drawer').classList.toggle('open',open);
  document.getElementById('overlay').classList.toggle('open',open);
}

window.addEventListener('scroll',()=>{
  const h=document.documentElement.scrollHeight-window.innerHeight;
  document.getElementById('scroll-bar').style.transform='scaleX('+(h>0?window.scrollY/h:0)+')';
});

renderAllNav();renderProgress();renderLesson(current);
</script>
</body>
</html>
