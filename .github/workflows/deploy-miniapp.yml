name: Deploy Mini App to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/miniapp/**'
      - '.github/workflows/deploy-miniapp.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/miniapp
          branch: gh-pages
          clean: true
