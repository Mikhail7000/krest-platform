<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КРЕСТ — Тренажёр мест писания</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
/* ══════════════════════════════════════════
   TRAINER — общий layout
══════════════════════════════════════════ */
.trainer-hero {
  text-align: center;
  padding: 40px 0 32px;
}
.trainer-hero h1 {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -.5px;
  margin-bottom: 8px;
}
.trainer-hero p {
  font-size: 16px;
  color: var(--text2);
  max-width: 520px;
  margin: 0 auto 28px;
  line-height: 1.55;
}

/* Streak bar */
.streak-bar {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border-radius: 40px;
  padding: 8px 20px;
  box-shadow: var(--shadow);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.streak-fire { font-size: 20px; }
.streak-days { color: var(--blue); }

/* Stats row */
.stats-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}
.stat-pill {
  background: var(--surface);
  border-radius: 12px;
  padding: 10px 20px;
  text-align: center;
  box-shadow: var(--shadow);
  min-width: 90px;
}
.stat-pill .stat-n { font-size: 22px; font-weight: 900; }
.stat-pill .stat-l { font-size: 11px; color: var(--text2); font-weight: 600; margin-top: 2px; }

/* ══ Tabs ══ */
.trainer-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 14px;
  padding: 4px;
  margin: 32px 0 24px;
  max-width: 460px;
}
.ttab {
  flex: 1;
  padding: 10px 8px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  background: transparent;
  color: var(--text2);
  transition: all .15s;
}
.ttab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 8px rgba(0,0,0,.1);
}

/* ══ Verse cards collection ══ */
.collection-section { margin-bottom: 40px; }
.collection-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.collection-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.collection-title { font-size: 16px; font-weight: 800; }
.collection-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 600;
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 20px;
}

.verse-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.verse-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .15s;
  position: relative;
}
.verse-card:hover {
  border-color: var(--blue);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,.12);
}
.verse-card.mastered { border-color: var(--green); }
.verse-card.in-progress { border-color: #f59e0b; }

.vc-ref {
  font-size: 13px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 6px;
}
.vc-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.vc-mastery {
  display: flex;
  gap: 4px;
  margin-top: 12px;
}
.vc-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}
.vc-dot.filled { background: var(--blue); }
.vc-dot.gold   { background: #f59e0b; }
.vc-dot.green  { background: var(--green); }
.vc-block-badge {
  position: absolute;
  top: 14px; right: 14px;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  color: #fff;
}

/* ══ Add custom verse ══ */
.add-verse-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  border: 2px dashed var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  transition: all .15s;
  min-height: 100px;
}
.add-verse-card:hover { border-color: var(--blue); color: var(--blue); }

/* ══ TRAINING MODAL ══ */
.train-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.train-overlay.open { display: flex; }

.train-modal {
  background: var(--surface);
  border-radius: 24px;
  width: 100%;
  max-width: 560px;
  padding: 32px;
  box-shadow: 0 24px 80px rgba(0,0,0,.2);
  position: relative;
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.train-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--bg);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
}

/* mode tabs inside modal */
.mode-steps {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
}
.mode-step {
  flex: 1;
  height: 5px;
  border-radius: 3px;
  background: var(--border);
  transition: background .3s;
}
.mode-step.active   { background: var(--blue); }
.mode-step.done     { background: var(--green); }

.mode-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.train-ref {
  font-size: 15px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 16px;
}

/* ── Mode 1: READ ── */
.read-verse {
  font-size: 18px;
  line-height: 1.7;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 28px;
  padding: 20px;
  background: var(--bg);
  border-radius: 12px;
  text-align: center;
}

/* ── Mode 2: BLANKS ── */
.blank-verse {
  font-size: 17px;
  line-height: 2;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 20px;
  text-align: center;
}
.blank-word {
  display: inline-block;
  border-bottom: 2px solid var(--blue);
  min-width: 60px;
  text-align: center;
  cursor: pointer;
  color: transparent;
  background: var(--blue-light);
  border-radius: 4px;
  padding: 0 4px;
  margin: 0 2px;
  transition: all .15s;
  user-select: none;
}
.blank-word.revealed {
  color: var(--blue);
  font-weight: 700;
}
.blank-word.wrong {
  background: #fee2e2;
  border-color: var(--red, #ef4444);
  color: #ef4444;
}

/* ── Mode 3: FIRST LETTERS ── */
.fl-verse {
  font-size: 16px;
  line-height: 2;
  color: var(--text);
  margin-bottom: 20px;
  text-align: center;
  letter-spacing: .5px;
}
.fl-word {
  display: inline-block;
  margin: 0 3px;
}
.fl-char {
  display: inline-block;
  font-weight: 700;
  color: var(--blue);
}
.fl-hidden {
  display: inline-block;
  border-bottom: 1.5px solid var(--border);
  min-width: 10px;
  height: 1em;
}

.type-input {
  width: 100%;
  font-family: inherit;
  font-size: 16px;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  resize: vertical;
  min-height: 80px;
  outline: none;
  transition: border-color .15s;
  line-height: 1.6;
}
.type-input:focus { border-color: var(--blue); }
.type-input.correct { border-color: var(--green); background: #f0fdf4; }
.type-input.wrong   { border-color: #ef4444;     background: #fef2f2; }

/* ── Mode 4: FULL RECALL ── */
.recall-area { margin-bottom: 20px; }

/* Feedback */
.train-feedback {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  display: none;
}
.train-feedback.correct { background: #f0fdf4; color: #16a34a; display: block; }
.train-feedback.wrong   { background: #fef2f2; color: #dc2626; display: block; }
.train-feedback.hint    { background: var(--blue-light); color: var(--blue); display: block; font-weight: 400; font-size: 13px; line-height: 1.6; }

.train-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* ── Confetti / completion ── */
.completion-screen {
  text-align: center;
  padding: 20px 0;
}
.completion-icon { font-size: 64px; margin-bottom: 16px; }
.completion-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
.completion-sub   { font-size: 15px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }
.mastery-stars {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
  font-size: 32px;
}

/* ══ Add verse modal ══ */
.add-modal {
  background: var(--surface);
  border-radius: 20px;
  width: 100%;
  max-width: 480px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}

/* ══ Responsive ══ */
@media (max-width: 600px) {
  .verse-cards { grid-template-columns: 1fr; }
  .train-modal { padding: 24px 20px; }
  .stats-row { gap: 8px; }
  .stat-pill { min-width: 70px; padding: 8px 12px; }
}
</style>
</head>
<body>
<nav id="topnav"></nav>

<div class="page">

  <!-- HERO -->
  <div class="trainer-hero">
    <div style="font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">КРЕСТ — путь спасения</div>
    <h1>Тренажёр мест писания</h1>
    <p>Учи библейские стихи шаг за шагом — от чтения до полного воспроизведения по памяти. Слово Бога — сила в твоей жизни.</p>

    <div class="streak-bar">
      <span class="streak-fire">🔥</span>
      <span id="streak-label">Серия:</span>
      <span class="streak-days" id="streak-count">0 дней</span>
    </div>

    <div class="stats-row">
      <div class="stat-pill">
        <div class="stat-n" id="stat-total">0</div>
        <div class="stat-l" id="sl-total">Всего</div>
      </div>
      <div class="stat-pill">
        <div class="stat-n" id="stat-learning">0</div>
        <div class="stat-l" id="sl-learning">Учу</div>
      </div>
      <div class="stat-pill">
        <div class="stat-n" id="stat-mastered">0</div>
        <div class="stat-l" id="sl-mastered">Знаю</div>
      </div>
      <div class="stat-pill">
        <div class="stat-n" id="stat-due">0</div>
        <div class="stat-l" id="sl-due">На сегодня</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="trainer-tabs">
    <button class="ttab active" onclick="switchTab('crest')"  id="ttab-crest">📖 Курс КРЕСТ</button>
    <button class="ttab"        onclick="switchTab('custom')" id="ttab-custom">⭐ Мои стихи</button>
    <button class="ttab"        onclick="switchTab('due')"    id="ttab-due">📅 На сегодня</button>
  </div>

  <!-- CREST verses tab -->
  <div id="tab-crest">
    <div id="crest-collections"></div>
  </div>

  <!-- My verses tab -->
  <div id="tab-custom" style="display:none">
    <div class="verse-cards" id="custom-cards">
      <div class="add-verse-card" onclick="openAddModal()">
        <span style="font-size:24px">+</span>
        <span id="lbl-add-verse">Добавить свой стих</span>
      </div>
    </div>
  </div>

  <!-- Due today tab -->
  <div id="tab-due" style="display:none">
    <div id="due-list"></div>
  </div>

</div>

<!-- ═══════════════════════════════
     TRAINING MODAL
════════════════════════════════ -->
<div class="train-overlay" id="train-overlay">
  <div class="train-modal" id="train-modal">
    <button class="train-close" onclick="closeTrainer()">×</button>

    <!-- Progress steps -->
    <div class="mode-steps" id="mode-steps">
      <div class="mode-step" id="step-0"></div>
      <div class="mode-step" id="step-1"></div>
      <div class="mode-step" id="step-2"></div>
      <div class="mode-step" id="step-3"></div>
    </div>

    <!-- Content area (dynamic) -->
    <div id="train-content"></div>
  </div>
</div>

<!-- ═══════════════════════════════
     ADD VERSE MODAL
════════════════════════════════ -->
<div class="train-overlay" id="add-overlay">
  <div class="add-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:17px;font-weight:800" id="add-modal-title">Добавить стих</span>
      <button class="train-close" style="position:static" onclick="closeAddModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-ref-input">Место писания (напр. Ин 3:16)</label>
      <input class="form-input" id="add-ref" placeholder="Иоанна 3:16">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-text-input">Текст стиха</label>
      <textarea class="form-textarea" id="add-text" style="min-height:120px"
        placeholder="Ибо так возлюбил Бог мир, что отдал Сына Своего единородного..."></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="saveCustomVerse()" id="save-verse-btn">Сохранить</button>
      <button class="btn btn-outline" onclick="closeAddModal()">Отмена</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>

// ═══════════════════════════════════════════════════
// CREST VERSES — все стихи курса (Синодальный пер.)
// ═══════════════════════════════════════════════════
const CREST_VERSES = [
  // ── Блок 1: Принцип Сотворения
  { block: 1, ref: 'Бытие 1:27',
    text: 'И сотворил Бог человека по образу Своему, по образу Божию сотворил его; мужчину и женщину сотворил их.' },
  { block: 1, ref: 'Бытие 2:7',
    text: 'И создал Господь Бог человека из праха земного, и вдунул в лице его дыхание жизни, и стал человек душою живою.' },
  { block: 1, ref: 'Иоанна 4:24',
    text: 'Бог есть дух, и поклоняющиеся Ему должны поклоняться в духе и истине.' },

  // ── Блок 2: Коренная Проблема
  { block: 2, ref: 'Римлянам 3:23',
    text: 'Потому что все согрешили и лишены славы Божией.' },
  { block: 2, ref: 'Римлянам 6:23',
    text: 'Ибо возмездие за грех — смерть, а дар Божий — жизнь вечная во Христе Иисусе, Господе нашем.' },
  { block: 2, ref: 'Иоанна 8:44',
    text: 'Ваш отец диавол; и вы хотите исполнять похоти отца вашего. Он был человекоубийца от начала и не устоял в истине, ибо нет в нём истины.' },
  { block: 2, ref: 'Ефесянам 2:1',
    text: 'И вас, мёртвых по преступлениям и грехам вашим, в которых вы некогда жили по обычаю мира сего.' },

  // ── Блок 3: 6 Состояний неверующего
  { block: 3, ref: '2 Коринфянам 4:4',
    text: 'Для неверующих, у которых бог века сего ослепил умы, чтобы для них не воссиял свет благовествования о славе Христа.' },
  { block: 3, ref: 'Ефесянам 6:12',
    text: 'Потому что наша брань не против крови и плоти, но против начальств, против властей, против мироправителей тьмы века сего.' },
  { block: 3, ref: '1 Иоанна 5:19',
    text: 'Мы знаем, что мы от Бога и что весь мир лежит во зле.' },

  // ── Блок 4: 3 Состояния мира
  { block: 4, ref: 'Иоанна 14:6',
    text: 'Иисус сказал ему: Я есмь путь и истина и жизнь; никто не приходит к Отцу, как только через Меня.' },
  { block: 4, ref: 'Деяния 4:12',
    text: 'Нет другого имени под небом, данного человекам, которым надлежало бы нам спастись.' },
  { block: 4, ref: 'Колоссянам 2:8',
    text: 'Смотрите, братия, чтобы кто не увлёк вас философиею и пустым обольщением, по преданию человеческому, а не по Христу.' },

  // ── Блок 5: 3 Работы Христа
  { block: 5, ref: '1 Тимофею 2:5',
    text: 'Ибо един Бог, един и посредник между Богом и человеками, человек Христос Иисус.' },
  { block: 5, ref: 'Евреям 9:12',
    text: 'И не с кровью козлов и тельцов, но со Своею Кровию, однажды вошёл во святилище и приобрёл вечное искупление.' },
  { block: 5, ref: 'Римлянам 10:9',
    text: 'Ибо если устами твоими будешь исповедовать Иисуса Господом и сердцем твоим веровать, что Бог воскресил Его из мёртвых, то спасёшься.' },
  { block: 5, ref: 'Римлянам 10:10',
    text: 'Потому что сердцем веруют к праведности, а устами исповедуют ко спасению.' },

  // ── Блок 6: 7 Благословений верующего
  { block: 6, ref: 'Иоанна 1:12',
    text: 'А тем, которые приняли Его, верующим во имя Его, дал власть быть чадами Божиими.' },
  { block: 6, ref: '1 Коринфянам 3:16',
    text: 'Разве не знаете, что вы храм Божий, и Дух Божий живёт в вас?' },
  { block: 6, ref: 'Иоанна 14:14',
    text: 'Если чего попросите во имя Моё, Я то сделаю.' },
  { block: 6, ref: 'Евреям 1:14',
    text: 'Не все ли они суть служебные духи, посылаемые на служение для тех, которые имеют наследовать спасение?' },
  { block: 6, ref: 'Луки 10:19',
    text: 'Се, даю вам власть наступать на змей и скорпионов и на всю силу вражью, и ничто не повредит вам.' },
  { block: 6, ref: 'Филиппийцам 3:20',
    text: 'Наше же жительство — на небесах, откуда мы ожидаем и Спасителя, Господа нашего Иисуса Христа.' },
  { block: 6, ref: 'Матфея 28:19',
    text: 'Итак идите, научите все народы, крестя их во имя Отца и Сына и Святого Духа.' },
];

const BLOCK_COLORS = ['#0071e3','#ff6b35','#8e44ad','#e67e22','#27ae60','#2980b9'];
const BLOCK_NAMES_RU = [
  'Принцип Сотворения',
  'Коренная Проблема',
  '6 Состояний неверующего',
  '3 Состояния мира',
  '3 Работы Христа',
  '7 Благословений верующего',
];

// Mastery: localStorage key = 'crest_mastery_' + ref
// Value: 0=new, 1=read, 2=blanks, 3=firstletters, 4=recall (MASTERED)
// Due: localStorage key = 'crest_due_' + ref => ISO date string

function getMastery(ref) { return parseInt(localStorage.getItem('crest_mastery_' + ref) || '0'); }
function setMastery(ref, lvl) {
  localStorage.setItem('crest_mastery_' + ref, lvl);
  if (lvl >= 4) {
    // Schedule review: 3 days later
    const d = new Date(); d.setDate(d.getDate() + 3);
    localStorage.setItem('crest_due_' + ref, d.toISOString().slice(0, 10));
  }
}
function getDue(ref) { return localStorage.getItem('crest_due_' + ref) || null; }

// Streak
function getStreak() { return parseInt(localStorage.getItem('crest_streak') || '0'); }
function getTodayKey() { return new Date().toISOString().slice(0,10); }
function markTodayActive() {
  const last = localStorage.getItem('crest_last_active');
  const today = getTodayKey();
  if (last === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yKey = yesterday.toISOString().slice(0,10);
  const streak = last === yKey ? getStreak() + 1 : 1;
  localStorage.setItem('crest_streak', streak);
  localStorage.setItem('crest_last_active', today);
}

// ═══════════════ STATE ═══════════════
let currentUser, currentProfile;
let activeTab = 'crest';
let customVerses = [];
// Training state
let trainVerse = null;   // {ref, text, isCustom}
let trainMode  = 0;      // 0=read, 1=blanks, 2=firstletters, 3=recall
let blankWords = [];     // indices of hidden words

async function init() {
  const ctx = await requireAuth('../login.html');
  if (!ctx) return;
  currentUser    = ctx.user;
  currentProfile = ctx.profile;
  renderNav(currentProfile, false);
  applyTranslations();
  markTodayActive();
  updateStats();
  renderStreak();
  await loadCustomVerses();
  renderCrestCollections();
  renderDueToday();
}

function applyTranslations() {
  const ru = LANG === 'ru';
  document.getElementById('ttab-crest').textContent  = ru ? '📖 Курс КРЕСТ' : '📖 KREST Course';
  document.getElementById('ttab-custom').textContent = ru ? '⭐ Мои стихи'  : '⭐ My Verses';
  document.getElementById('ttab-due').textContent    = ru ? '📅 На сегодня' : '📅 Due Today';
  document.getElementById('streak-label').textContent = ru ? 'Серия:' : 'Streak:';
  document.getElementById('sl-total').textContent    = ru ? 'Всего'   : 'Total';
  document.getElementById('sl-learning').textContent = ru ? 'Учу'     : 'Learning';
  document.getElementById('sl-mastered').textContent = ru ? 'Знаю'    : 'Mastered';
  document.getElementById('sl-due').textContent      = ru ? 'На сегодня' : 'Due today';
  document.getElementById('lbl-add-verse').textContent   = ru ? 'Добавить свой стих'      : 'Add custom verse';
  document.getElementById('add-modal-title').textContent = ru ? 'Добавить стих'            : 'Add Verse';
  document.getElementById('lbl-ref-input').textContent   = ru ? 'Место писания (напр. Ин 3:16)' : 'Reference (e.g. John 3:16)';
  document.getElementById('lbl-text-input').textContent  = ru ? 'Текст стиха'              : 'Verse text';
  document.getElementById('save-verse-btn').textContent  = ru ? 'Сохранить'                : 'Save';
}

function renderStreak() {
  const s = getStreak();
  document.getElementById('streak-count').textContent =
    s + (LANG === 'ru' ? (s === 1 ? ' день' : s < 5 ? ' дня' : ' дней') : (s === 1 ? ' day' : ' days'));
}

function updateStats() {
  const allRefs = [
    ...CREST_VERSES.map(v => v.ref),
    ...customVerses.map(v => v.ref),
  ];
  const today = getTodayKey();
  let mastered = 0, learning = 0, due = 0;
  allRefs.forEach(r => {
    const m = getMastery(r);
    if (m >= 4) { mastered++; const d = getDue(r); if (d && d <= today) due++; }
    else if (m > 0) learning++;
  });
  document.getElementById('stat-total').textContent   = allRefs.length;
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-learning').textContent = learning;
  document.getElementById('stat-due').textContent      = due;
}

// ════════════════════════════════════════
// CREST collections
// ════════════════════════════════════════
function renderCrestCollections() {
  const el = document.getElementById('crest-collections');
  el.innerHTML = '';
  for (let b = 1; b <= 6; b++) {
    const verses = CREST_VERSES.filter(v => v.block === b);
    const color  = BLOCK_COLORS[b-1];
    const name   = LANG === 'ru' ? `Блок ${b} — ${BLOCK_NAMES_RU[b-1]}` : `Block ${b}`;
    el.innerHTML += `
      <div class="collection-section">
        <div class="collection-header">
          <div class="collection-dot" style="background:${color}"></div>
          <span class="collection-title">${name}</span>
          <span class="collection-count">${verses.length} ${LANG==='ru'?'стихов':'verses'}</span>
        </div>
        <div class="verse-cards">
          ${verses.map(v => verseCardHTML(v, color, b)).join('')}
        </div>
      </div>`;
  }
}

function verseCardHTML(v, color, block) {
  const m = getMastery(v.ref);
  const cls = m >= 4 ? 'mastered' : m > 0 ? 'in-progress' : '';
  const dots = [0,1,2,3].map(i =>
    `<div class="vc-dot ${i < m ? (m>=4?'green':'filled') : ''}"></div>`
  ).join('');
  return `
    <div class="verse-card ${cls}" onclick="startTraining(${JSON.stringify(v).replace(/"/g,'&quot;')})">
      <div class="vc-block-badge" style="background:${color}">Блок ${block}</div>
      <div class="vc-ref">${v.ref}</div>
      <div class="vc-text">${v.text}</div>
      <div class="vc-mastery">${dots}</div>
    </div>`;
}

// ════════════════════════════════════════
// CUSTOM verses
// ════════════════════════════════════════
async function loadCustomVerses() {
  const { data } = await _supabase
    .from('bible_verses')
    .select('*')
    .eq('user_id', currentUser.id)
    .is('lesson_id', null)
    .order('created_at');
  customVerses = (data || []).map(r => ({ ref: r.reference, text: r.verse_text, id: r.id }));
  renderCustomVerses();
}

function renderCustomVerses() {
  const el = document.getElementById('custom-cards');
  const addBtn = `<div class="add-verse-card" onclick="openAddModal()">
    <span style="font-size:24px">+</span>
    <span>${LANG==='ru'?'Добавить свой стих':'Add custom verse'}</span>
  </div>`;
  el.innerHTML = customVerses.map(v => `
    <div class="verse-card ${getMastery(v.ref)>=4?'mastered':getMastery(v.ref)>0?'in-progress':''}"
         onclick="startTraining(${JSON.stringify(v).replace(/"/g,'&quot;')})">
      <div class="vc-ref">${v.ref}</div>
      <div class="vc-text">${v.text}</div>
      <div class="vc-mastery">${[0,1,2,3].map(i=>`<div class="vc-dot ${i<getMastery(v.ref)?(getMastery(v.ref)>=4?'green':'filled'):''}"></div>`).join('')}</div>
    </div>`).join('') + addBtn;
}

function openAddModal()  { document.getElementById('add-overlay').classList.add('open'); }
function closeAddModal() { document.getElementById('add-overlay').classList.remove('open'); }

async function saveCustomVerse() {
  const ref  = document.getElementById('add-ref').value.trim();
  const text = document.getElementById('add-text').value.trim();
  if (!ref || !text) return;
  const { error } = await _supabase.from('bible_verses').insert({
    user_id: currentUser.id, reference: ref, verse_text: text,
  });
  if (!error) {
    toast(LANG==='ru'?'Стих добавлен':'Verse added', 'success');
    closeAddModal();
    document.getElementById('add-ref').value  = '';
    document.getElementById('add-text').value = '';
    await loadCustomVerses();
    updateStats();
  }
}

// ════════════════════════════════════════
// DUE TODAY
// ════════════════════════════════════════
function renderDueToday() {
  const today = getTodayKey();
  const allV = [
    ...CREST_VERSES,
    ...customVerses,
  ];
  const due = allV.filter(v => {
    const d = getDue(v.ref);
    return d && d <= today;
  });
  const el = document.getElementById('due-list');
  if (!due.length) {
    el.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--text2)">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px">${LANG==='ru'?'На сегодня всё!':'All done for today!'}</div>
      <div style="font-size:14px">${LANG==='ru'?'Повторение запланировано — возвращайся завтра.':'Reviews scheduled — come back tomorrow.'}</div>
    </div>`;
    return;
  }
  el.innerHTML = `<div style="margin-bottom:16px;font-size:14px;color:var(--text2)">${due.length} ${LANG==='ru'?'стихов на повторение:':'verses to review:'}</div>
  <div class="verse-cards">${due.map(v => verseCardHTML(v, '#f59e0b', '')).join('')}</div>`;
}

// ════════════════════════════════════════
// TABS
// ════════════════════════════════════════
function switchTab(name) {
  activeTab = name;
  ['crest','custom','due'].forEach(t => {
    document.getElementById('tab-' + t).style.display    = t === name ? 'block' : 'none';
    document.getElementById('ttab-' + t).classList.toggle('active', t === name);
  });
}

// ════════════════════════════════════════
// TRAINING ENGINE
// ════════════════════════════════════════
function startTraining(verse) {
  trainVerse = verse;
  trainMode  = getMastery(verse.ref);
  if (trainMode >= 4) trainMode = 0; // restart review
  document.getElementById('train-overlay').classList.add('open');
  renderTrainMode();
}

function closeTrainer() {
  document.getElementById('train-overlay').classList.remove('open');
  renderCrestCollections();
  renderCustomVerses();
  updateStats();
}

function renderTrainMode() {
  updateStepDots();
  const c = document.getElementById('train-content');

  const refHTML = `<div class="train-ref">${trainVerse.ref}</div>`;

  if (trainMode === 0) renderModeRead(c, refHTML);
  else if (trainMode === 1) renderModeBlanks(c, refHTML);
  else if (trainMode === 2) renderModeFirstLetters(c, refHTML);
  else if (trainMode === 3) renderModeRecall(c, refHTML);
  else renderCompletion(c);
}

function updateStepDots() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('step-' + i);
    el.className = 'mode-step' + (i < trainMode ? ' done' : i === trainMode ? ' active' : '');
  }
}

// ── MODE 0: READ ──────────────────────
function renderModeRead(c, refHTML) {
  c.innerHTML = `
    <div class="mode-label">📖 ${LANG==='ru'?'Читай и запоминай':'Read & Remember'}</div>
    ${refHTML}
    <div class="read-verse">${trainVerse.text}</div>
    <div class="train-actions">
      <button class="btn btn-primary" onclick="advanceMode()">${LANG==='ru'?'Я знаю этот стих →':'I know this verse →'}</button>
      <button class="btn btn-outline"  onclick="closeTrainer()">${LANG==='ru'?'Позже':'Later'}</button>
    </div>`;
}

// ── MODE 1: BLANKS ────────────────────
function renderModeBlanks(c, refHTML) {
  const words = trainVerse.text.split(' ');
  // Hide ~40% of words randomly, keep punctuation attached
  blankWords = [];
  words.forEach((w, i) => {
    if (Math.random() < 0.4) blankWords.push(i);
  });
  if (blankWords.length === 0) blankWords.push(Math.floor(words.length / 2));

  const html = words.map((w, i) => blankWords.includes(i)
    ? `<span class="blank-word" data-word="${w}" data-idx="${i}" onclick="revealBlank(this)">${w}</span>`
    : `<span>${w}</span>`
  ).join(' ');

  c.innerHTML = `
    <div class="mode-label">🧩 ${LANG==='ru'?'Нажми на пропуски':'Tap the blanks'}</div>
    ${refHTML}
    <div class="blank-verse">${html}</div>
    <div class="train-feedback" id="train-fb"></div>
    <div class="train-actions">
      <button class="btn btn-primary" onclick="checkBlanks()">${LANG==='ru'?'Проверить':'Check'}</button>
      <button class="btn btn-ghost"   onclick="showHintBlanks()">${LANG==='ru'?'Подсказка':'Hint'}</button>
    </div>`;
}

function revealBlank(el) {
  el.classList.toggle('revealed');
}

function checkBlanks() {
  const unrevealed = document.querySelectorAll('.blank-word:not(.revealed)');
  const fb = document.getElementById('train-fb');
  if (unrevealed.length === 0) {
    fb.className = 'train-feedback correct';
    fb.textContent = LANG==='ru'?'Отлично! Все пропуски открыты.':'Great! All blanks revealed.';
    setTimeout(() => advanceMode(), 1000);
  } else {
    fb.className = 'train-feedback wrong';
    fb.textContent = (LANG==='ru'?'Осталось':'Remaining') + ': ' + unrevealed.length;
  }
}

function showHintBlanks() {
  const first = document.querySelector('.blank-word:not(.revealed)');
  if (first) first.classList.add('revealed');
}

// ── MODE 2: FIRST LETTERS ─────────────
function renderModeFirstLetters(c, refHTML) {
  const words = trainVerse.text.split(' ');
  const html = words.map(w => {
    const first = w[0] || '';
    const rest  = w.slice(1).replace(/./g, '_');
    return `<span class="fl-word"><span class="fl-char">${first}</span><span class="fl-hidden">${rest}</span></span>`;
  }).join(' ');

  c.innerHTML = `
    <div class="mode-label">🔤 ${LANG==='ru'?'Первые буквы':'First letters'}</div>
    ${refHTML}
    <div class="fl-verse">${html}</div>
    <div class="form-group">
      <textarea class="type-input" id="fl-input" placeholder="${LANG==='ru'?'Напиши стих по первым буквам...':'Type the verse using first letters as guide...'}"></textarea>
    </div>
    <div class="train-feedback" id="train-fb"></div>
    <div class="train-actions">
      <button class="btn btn-primary" onclick="checkFirstLetters()">${LANG==='ru'?'Проверить':'Check'}</button>
      <button class="btn btn-ghost"   onclick="showFullVerse()">${LANG==='ru'?'Показать стих':'Show verse'}</button>
    </div>`;
}

function checkFirstLetters() {
  const input = document.getElementById('fl-input').value.trim();
  const target = trainVerse.text;
  const similarity = calcSimilarity(input, target);
  const fb = document.getElementById('train-fb');
  if (similarity >= 0.75) {
    fb.className = 'train-feedback correct';
    fb.textContent = LANG==='ru'?'Прекрасно! Движемся дальше.':'Excellent! Moving on.';
    document.getElementById('fl-input').className = 'type-input correct';
    setTimeout(() => advanceMode(), 1000);
  } else {
    fb.className = 'train-feedback wrong';
    fb.textContent = (LANG==='ru'?'Попробуй ещё. Совпадение:':'Try again. Match:') + ' ' + Math.round(similarity*100) + '%';
    document.getElementById('fl-input').className = 'type-input wrong';
  }
}

function showFullVerse() {
  const fb = document.getElementById('train-fb');
  fb.className = 'train-feedback hint';
  fb.innerHTML = trainVerse.text;
}

// ── MODE 3: FULL RECALL ───────────────
function renderModeRecall(c, refHTML) {
  c.innerHTML = `
    <div class="mode-label">🔥 ${LANG==='ru'?'Напиши по памяти':'Write from memory'}</div>
    ${refHTML}
    <div class="recall-area">
      <textarea class="type-input" id="recall-input" style="min-height:120px"
        placeholder="${LANG==='ru'?'Напиши стих полностью по памяти...':'Write the full verse from memory...'}"></textarea>
    </div>
    <div class="train-feedback" id="train-fb"></div>
    <div class="train-actions">
      <button class="btn btn-primary" onclick="checkRecall()">${LANG==='ru'?'Проверить':'Check'}</button>
      <button class="btn btn-ghost"   onclick="showFullVerse()">${LANG==='ru'?'Показать стих':'Show verse'}</button>
    </div>`;
}

function checkRecall() {
  const input = document.getElementById('recall-input').value.trim();
  const target = trainVerse.text;
  const similarity = calcSimilarity(input, target);
  const fb = document.getElementById('train-fb');
  if (similarity >= 0.8) {
    fb.className = 'train-feedback correct';
    fb.textContent = LANG==='ru'?'Ты знаешь этот стих наизусть! 🎉':'You know this verse by heart! 🎉';
    document.getElementById('recall-input').className = 'type-input correct';
    setTimeout(() => advanceMode(), 1200);
  } else if (similarity >= 0.5) {
    fb.className = 'train-feedback wrong';
    fb.innerHTML = (LANG==='ru'?'Почти! Совпадение ':'Almost! Match ') + Math.round(similarity*100) + '%. ' +
      `<br><strong>${LANG==='ru'?'Правильно:':'Correct:'}</strong> ${target}`;
    document.getElementById('recall-input').className = 'type-input wrong';
  } else {
    fb.className = 'train-feedback hint';
    fb.innerHTML = `<strong>${LANG==='ru'?'Стих:':'Verse:'}</strong> ${target}`;
  }
}

// ── COMPLETION ────────────────────────
function renderCompletion(c) {
  setMastery(trainVerse.ref, 4);
  markTodayActive();
  document.getElementById('mode-steps').innerHTML = '';
  c.innerHTML = `
    <div class="completion-screen">
      <div class="completion-icon">🏆</div>
      <div class="completion-title">${LANG==='ru'?'Выучено!':'Mastered!'}</div>
      <div class="completion-sub">${trainVerse.ref}<br>${LANG==='ru'?'Этот стих запланирован на повторение через 3 дня.':'This verse is scheduled for review in 3 days.'}</div>
      <div class="mastery-stars">⭐⭐⭐⭐</div>
      <div class="train-actions" style="justify-content:center">
        <button class="btn btn-primary" onclick="closeTrainer()">${LANG==='ru'?'Готово':'Done'}</button>
        <button class="btn btn-outline" onclick="trainNextVerse()">${LANG==='ru'?'Следующий стих':'Next verse'}</button>
      </div>
    </div>`;
}

function advanceMode() {
  trainMode++;
  setMastery(trainVerse.ref, trainMode);
  if (trainMode <= 3) {
    document.getElementById('mode-steps').innerHTML = [0,1,2,3].map(i =>
      `<div class="mode-step" id="step-${i}"></div>`).join('');
  }
  renderTrainMode();
}

function trainNextVerse() {
  // Find next unmastered verse
  const all = [...CREST_VERSES, ...customVerses];
  const next = all.find(v => getMastery(v.ref) < 4 && v.ref !== trainVerse.ref);
  if (next) startTraining(next);
  else closeTrainer();
}

// ════════════════════════════════════════
// SIMILARITY (fuzzy match)
// ════════════════════════════════════════
function calcSimilarity(a, b) {
  const normalize = s => s.toLowerCase()
    .replace(/[.,!?;:«»"'–—-]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  const wa = normalize(a).split(' ');
  const wb = normalize(b).split(' ');
  const matches = wa.filter(w => wb.includes(w)).length;
  return matches / Math.max(wb.length, 1);
}

init();
</script>
